<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Game Tài Xỉu Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
    /* ========== CODE GỐC GIỮ NGUYÊN 100% ========== */
    body {
        background: #0a0a0f;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        flex-direction: column;
    }

    .main {
        background: url('imgs/img.png') no-repeat -1150px -2px;
        width: 771px;
        height: 507px;
        margin: auto;
        position: relative;
        text-align: center;
        border: 2px solid rgba(0,255,255,0.2);
        border-radius: 20px;
        overflow: hidden;
    }
    .xiu {
        background: url('imgs/img.png') no-repeat -343px -867px;
        width: 130px;
        height: 74px;
        position: absolute;
        left: 98px;
        top: 190px;
        animation: zoomout 0.2s ease-in-out infinite alternate;
    }
    .tai {
        background: url('imgs/img.png') no-repeat -1290px -870px;
        width: 108px;
        height: 68px;
        position: absolute;
        right: 98px;
        top: 190px;
        animation: zoomout 0.2s ease-in-out infinite alternate;
    }
    .user {
        background: url('imgs/img.png') no-repeat -1970px -416px;
        width: 26px;
        height: 34px;
        position: absolute;
        right: 200px;
        top: 380px;
    }
    .dragon {
        background: url('imgs/img.png') no-repeat -1538px -514px;
        width: 317px;
        height: 309px;
        position: absolute;
        left: 230px;
        top: 130px;
        animation: spin 5s linear infinite;
    }
    .input {
        width: 200px;
        height: 60px;
        border-radius: 50px;
        position: absolute;
        left: 45px;
        top: 305px;
        outline: 0;
        text-align: center;
        font-size: 30px;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.15);
        color: #fff;
    }
    .txt {
        padding-top: 410px;
        text-align: center;
        top: 300px;
    }
    .statustxt {
        font-size: 25px;
        font-weight: bold;
        font-family: "Segoe UI";
        top: 500px;
        text-shadow: 0 0 3px #000;
        color: #ffd700;
        transition: 0.5s;
        opacity: 0;
    }
    .usertxt {
        font-size: 25px;
        font-weight: bold;
        font-family: "Segoe UI";
        top: 500px;
        text-shadow: 0 0 3px #000;
        color: white;
    }
    .dice {
        position: absolute;
    }
    .dice1 {
        background: url('imgs/dice.png') no-repeat -507px -2px;
        width: 98px;
        height: 96px;
        transform: scale(0.8) rotate(-20deg);
        left: 340px;
        top: 200px;
        opacity: 0;
    }
    .dice2 {
        background: url('imgs/dice.png') no-repeat -404px -3px;
        width: 98px;
        height: 96px;
        transform: scale(0.8) rotate(20deg);
        left: 300px;
        top: 270px;
        opacity: 0;
    }
    .dice3 {
        background: url('imgs/dice.png') no-repeat 0 -2px;
        width: 98px;
        height: 96px;
        transform: scale(0.8) rotate(10deg);
        left: 380px;
        top: 270px;
        opacity: 0;
    }
    .khung {
        background: url('imgs/img.png') no-repeat -1107px -828px;
        width: 179px;
        height: 45px;
        transform: scale(0.6);
        position: absolute;
        left: 120px;
        top: 135px;
    }
    .time {
        font-size: 100px;
        font-family: 'Intro', sans-serif;
        font-weight: 800;
        text-transform: uppercase;
        background: -webkit-linear-gradient(-86deg, #660610 5%, black 53%, #0A99B8 91%);
        -webkit-background-clip: text;
        -webkit-text-stroke: 8px transparent;
        color: white;
        position: absolute;
        left: 320px;
        top: 200px;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    @keyframes zoomout {
        0% { transform: scale(1.0); }
        100% { transform: scale(1.2); }
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
    }

    /* ========== MENU 3 GẠCH ========== */
    .menu-icon {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 28px;
        font-weight: bold;
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
        z-index: 100;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: 0.3s;
        font-family: monospace;
    }
    .menu-icon:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .sidebar {
        position: fixed;
        top: 0;
        right: -340px;
        width: 300px;
        height: 100%;
        background: rgba(15, 15, 30, 0.95);
        backdrop-filter: blur(20px);
        z-index: 1000;
        transition: 0.3s ease-out;
        padding: 80px 20px 30px;
        color: white;
        border-left: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: -5px 0 25px rgba(0, 0, 0, 0.3);
        overflow-y: auto;
    }
    .sidebar.open {
        right: 0;
    }
    .sidebar .user-area {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .sidebar .user-area .username {
        font-size: 20px;
        font-weight: bold;
        color: #fff;
    }
    .sidebar .user-area .balance {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 5px;
    }
    .sidebar .user-area .balance span {
        color: #ffd700;
        font-weight: bold;
    }
    .sidebar .menu-group {
        margin-bottom: 25px;
    }
    .sidebar .menu-title {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 2px;
        margin-bottom: 12px;
        text-transform: uppercase;
    }
    .sidebar .menu-item {
        padding: 12px 18px;
        margin: 5px 0;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
        transition: 0.2s;
        font-size: 14px;
        border-left: 2px solid transparent;
        color: rgba(255, 255, 255, 0.9);
    }
    .sidebar .menu-item:hover {
        background: rgba(255, 215, 0, 0.08);
        border-left-color: #ffd700;
    }
    .sidebar .menu-item.danger {
        color: #ff8888;
    }
    .sidebar .menu-item.danger:hover {
        background: rgba(255, 80, 80, 0.15);
        border-left-color: #ff6666;
    }

    /* ========== ĐĂNG NHẬP ========== */
    .auth-container {
        width: 100%;
        max-width: 400px;
        margin: 20px auto 0;
        display: block;
    }
    .auth-container.hidden {
        display: none;
    }
    .auth-box {
        background: rgba(15, 15, 30, 0.85);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 30px 25px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }
    .auth-title {
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.9);
        letter-spacing: 3px;
        margin-bottom: 4px;
    }
    .auth-subtitle {
        text-align: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
        margin-bottom: 18px;
        letter-spacing: 1px;
    }
    .auth-status {
        text-align: center;
        color: rgba(255, 255, 255, 0.4);
        font-size: 13px;
        margin-bottom: 15px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        min-height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .auth-status.error {
        color: #ff6b6b;
        background: rgba(255, 107, 107, 0.08);
    }
    .auth-status.success {
        color: #99FF66;
        background: rgba(153, 255, 102, 0.08);
    }
    .auth-input {
        width: 100%;
        padding: 12px 16px;
        margin: 6px 0;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.9);
        font-size: 14px;
        outline: none;
    }
    .auth-input::placeholder {
        color: rgba(255, 255, 255, 0.25);
    }
    .auth-input:focus {
        border-color: rgba(255, 215, 0, 0.4);
    }
    .auth-input.hidden {
        display: none !important;
    }
    .auth-buttons {
        display: flex;
        gap: 10px;
        margin-top: 14px;
    }
    .auth-btn {
        flex: 1;
        padding: 12px 10px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1px;
        transition: 0.25s;
    }
    .auth-btn-login {
        background: linear-gradient(135deg, #1a73e8, #0d47a1);
        color: white;
    }
    .auth-btn-login:hover {
        transform: translateY(-2px);
    }
    .auth-btn-register {
        background: linear-gradient(135deg, #2d8a4e, #1b5e2a);
        color: white;
    }
    .auth-btn-register:hover {
        transform: translateY(-2px);
    }
    .auth-divider {
        display: flex;
        align-items: center;
        gap: 15px;
        margin: 16px 0 6px;
    }
    .auth-divider::before,
    .auth-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
    }
    .auth-divider-text {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.15);
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .auth-footer {
        text-align: center;
        margin-top: 14px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.1);
    }

    .game-wrapper {
        display: none;
        width: 100%;
        max-width: 771px;
        margin: 0 auto;
        position: relative;
    }
    .game-wrapper.show {
        display: block;
    }

    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(12px);
        z-index: 2000;
        display: none;
        align-items: center;
        justify-content: center;
    }
    .modal-overlay.show {
        display: flex;
    }
    .modal-box {
        background: rgba(15, 15, 30, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 25px;
        max-width: 450px;
        width: 95%;
        max-height: 80vh;
        overflow-y: auto;
        border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .modal-box h3 {
        color: #fff;
        font-size: 18px;
        margin-bottom: 18px;
        text-align: center;
    }
    .modal-box .close-btn {
        float: right;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.3);
        font-size: 22px;
        cursor: pointer;
    }
    .modal-box .history-item {
        padding: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.9);
    }
    .modal-box .history-item .win { color: #99FF66; }
    .modal-box .history-item .lose { color: #ff6b6b; }
    .modal-box .gift-input {
        width: 100%;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        font-size: 14px;
        outline: none;
        margin: 8px 0;
    }
    .modal-box .gift-btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #2d8a4e, #1b5e2a);
        color: white;
        font-weight: 600;
        cursor: pointer;
    }
    .modal-box .gift-btn:hover {
        transform: scale(1.02);
    }
    </style>
</head>
<body>

<!-- ============================================================ -->
<!-- PHẦN ĐĂNG NHẬP -->
<!-- ============================================================ -->
<div id="authContainer" class="auth-container">
    <div class="auth-box">
        <div class="auth-title" id="authTitle">ĐĂNG NHẬP</div>
        <div class="auth-subtitle" id="authSubtitle">truy cập tài khoản game</div>
        <div class="auth-status" id="authStatus">chưa đăng nhập</div>
        <input class="auth-input" type="text" id="loginUser" placeholder="tên đăng nhập">
        <input class="auth-input hidden" type="email" id="loginEmail" placeholder="email">
        <input class="auth-input" type="password" id="loginPass" placeholder="mật khẩu">
        <div class="auth-buttons">
            <button class="auth-btn auth-btn-login" id="btnLogin" onclick="handleLogin()">ĐĂNG NHẬP</button>
            <button class="auth-btn auth-btn-register" id="btnRegister" onclick="handleRegister()">ĐĂNG KÝ</button>
        </div>
        <div class="auth-divider"><span class="auth-divider-text">bảo mật</span></div>
        <div class="auth-footer">lưu trữ cục bộ · mã hóa</div>
    </div>
</div>

<!-- ============================================================ -->
<!-- GAME GỐC -->
<!-- ============================================================ -->
<div id="gameWrapper" class="game-wrapper">
    <div class="main">
        <div id="dragon" class="dragon"></div>
        <div class="khung"></div>
        <div id="time" class="time"></div>
        <p id="id" class="statustxt" style="position: absolute; opacity: 1; left: 180px; top: 130px; font-size: 17px"></p>
        <div id="taitxt" class="tai"></div>
        <div id="xiutxt" class="xiu"></div>
        <p id="sumxiu" class="usertxt" style="position: absolute; left: 115px; top: 242px;"></p>
        <p id="sumtai" class="usertxt" style="position: absolute; right: 130px; top: 242px;"></p>
        <div id="dice1" class="dice dice1"></div>
        <div id="dice2" class="dice dice2"></div>
        <div id="dice3" class="dice dice3"></div>
        <div class="user"></div>
        <div class="user" style="left: 80px;"></div>
        <input id="pullxiu" class="input" type="number" placeholder="Cược Xỉu">
        <input id="pulltai" class="input" type="number" placeholder="Cược Tài" style="left: 525px;">
        <img src="" id="roll" style="position: absolute; left: 300px; top: 190px; transition: 0.5s; opacity: 0; width: 180px"/>
        <p id="userxiu" class="usertxt" style="position: absolute; left: 115px; top: 352px;"></p>
        <p id="usertai" class="usertxt" style="position: absolute; right: 180px; top: 352px;"></p>
        <div class="txt">
            <p id="statustxt" class="statustxt"></p>
        </div>

        <!-- MENU 3 GẠCH -->
        <div class="menu-icon" id="menuIcon">☰</div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="user-area">
            <div class="username" id="sidebarUser">User</div>
            <div class="balance">Số dư: <span id="sidebarBalance">0</span> Xu</div>
        </div>
        <div class="menu-group">
            <div class="menu-title">Thông tin</div>
            <div class="menu-item" onclick="showBalance()">Số dư</div>
            <div class="menu-item" onclick="showHistory()">Lịch sử chơi</div>
        </div>
        <div class="menu-group">
            <div class="menu-title">Tiện ích</div>
            <div class="menu-item" onclick="showGiftcode()">Giftcode</div>
            <div class="menu-item" onclick="toggleTheme()">Chế độ tối/sáng</div>
        </div>
        <div class="menu-group">
            <div class="menu-title">Tài khoản</div>
            <div class="menu-item danger" onclick="handleLogout()">Đăng xuất</div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-box">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div id="modalContent"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ======================= BIẾN TOÀN CỤC =======================
let currentUser = null;
let userBalance = 0;
let currentBetType = null;
let currentBetAmount = 0;
let betHistory = [];
let darkMode = true;
let isLoginMode = true;

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}
function showModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('show');
}
function showStt(msg, timeout = 3000) {
    let stt = document.getElementById('statustxt');
    stt.innerHTML = msg;
    stt.style.opacity = 1;
    setTimeout(() => { stt.style.opacity = 0; }, timeout);
}
function setAuthStatus(msg, type) {
    let status = document.getElementById('authStatus');
    status.textContent = msg;
    status.className = 'auth-status';
    if (type === 'error') status.classList.add('error');
    else if (type === 'success') status.classList.add('success');
}
function updateSidebarUI() {
    if (currentUser) {
        document.getElementById('sidebarUser').textContent = currentUser.toUpperCase();
        document.getElementById('sidebarBalance').textContent = userBalance.toLocaleString();
    }
}
function setLoginMode() {
    isLoginMode = true;
    document.getElementById('authTitle').textContent = 'ĐĂNG NHẬP';
    document.getElementById('authSubtitle').textContent = 'truy cập tài khoản game';
    document.getElementById('loginEmail').classList.add('hidden');
    document.getElementById('btnLogin').textContent = 'ĐĂNG NHẬP';
    document.getElementById('btnRegister').textContent = 'ĐĂNG KÝ';
    document.getElementById('authStatus').textContent = 'đăng nhập';
    document.getElementById('authStatus').className = 'auth-status';
}
function setRegisterMode() {
    isLoginMode = false;
    document.getElementById('authTitle').textContent = 'ĐĂNG KÝ';
    document.getElementById('authSubtitle').textContent = 'tạo tài khoản mới';
    document.getElementById('loginEmail').classList.remove('hidden');
    document.getElementById('btnLogin').textContent = 'ĐĂNG NHẬP';
    document.getElementById('btnRegister').textContent = 'ĐĂNG KÝ';
    document.getElementById('authStatus').textContent = 'đăng ký tài khoản mới';
    document.getElementById('authStatus').className = 'auth-status';
}

// ======================= ĐĂNG KÝ =======================
function handleRegister() {
    if (isLoginMode) { setRegisterMode(); return; }
    let user = document.getElementById("loginUser").value.trim();
    let email = document.getElementById("loginEmail").value.trim();
    let pass = document.getElementById("loginPass").value.trim();
    if (!user || !email || !pass) {
        setAuthStatus('vui lòng nhập đầy đủ thông tin', 'error');
        return;
    }
    if (!email.includes('@') || !email.includes('.')) {
        setAuthStatus('email không hợp lệ', 'error');
        return;
    }
    let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
    if (users[user]) {
        setAuthStatus('tên đăng nhập đã tồn tại', 'error');
        return;
    }
    users[user] = { password: pass, email: email, balance: 50000 };
    localStorage.setItem('taiXiu_users', JSON.stringify(users));
    setAuthStatus('đăng ký thành công! hãy đăng nhập', 'success');
    document.getElementById("loginUser").value = "";
    document.getElementById("loginEmail").value = "";
    document.getElementById("loginPass").value = "";
    setLoginMode();
}

// ======================= ĐĂNG NHẬP =======================
function handleLogin() {
    if (!isLoginMode) {
        setLoginMode();
        document.getElementById("loginEmail").value = "";
        setAuthStatus('đăng nhập', '');
        return;
    }
    let user = document.getElementById("loginUser").value.trim();
    let pass = document.getElementById("loginPass").value.trim();
    if (!user || !pass) {
        setAuthStatus('vui lòng nhập tên và mật khẩu', 'error');
        return;
    }
    let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
    if (users[user] && users[user].password === pass) {
        currentUser = user;
        userBalance = users[user].balance;
        localStorage.setItem('loggedInUser', user);
        setAuthStatus('đăng nhập thành công · chào ' + user, 'success');
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
        setTimeout(() => {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('gameWrapper').classList.add('show');
            updateSidebarUI();
            gameStart();
        }, 500);
    } else if (!users[user]) {
        setRegisterMode();
        setAuthStatus('tài khoản không tồn tại, nhập email để đăng ký', 'error');
    } else {
        setAuthStatus('sai tài khoản hoặc mật khẩu', 'error');
    }
}

// ======================= MENU 3 GẠCH =======================
document.getElementById('menuIcon').addEventListener('click', function(e) {
    e.stopPropagation();
    document.getElementById('sidebar').classList.toggle('open');
});
document.addEventListener('click', function(e) {
    let sidebar = document.getElementById('sidebar');
    let menuIcon = document.getElementById('menuIcon');
    if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== menuIcon) {
        sidebar.classList.remove('open');
    }
});

// ======================= CHỨC NĂNG MENU =======================
function showBalance() {
    showModal(`
        <h3>SỐ DƯ</h3>
        <p style="font-size: 28px; text-align: center; color: #ffd700; margin: 20px 0;">
            ${userBalance.toLocaleString()} Xu
        </p>
        <button onclick="closeModal()" style="width:100%; padding:12px; border:none; border-radius:12px; background:linear-gradient(135deg,#1a73e8,#0d47a1); color:white; font-weight:600; cursor:pointer;">Đóng</button>
    `);
}

function showHistory() {
    let html = `<h3>LỊCH SỬ CHƠI</h3>`;
    if (betHistory.length === 0) {
        html += `<p style="text-align:center; color:rgba(255,255,255,0.3);">Chưa có lịch sử chơi</p>`;
    } else {
        html += `<div style="max-height:300px; overflow-y:auto;">`;
        let totalWin = 0, totalLose = 0, totalBet = 0;
        for (let h of betHistory.slice(0, 30)) {
            let cls = h.result === 'THẮNG' ? 'win' : 'lose';
            let amount = h.result === 'THẮNG' ? '+' + h.amount.toLocaleString() : '-' + h.amount.toLocaleString();
            if (h.result === 'THẮNG') totalWin += h.amount;
            else totalLose += h.amount;
            totalBet += h.amount;
            html += `<div class="history-item">
                        <span>${h.time}</span>
                        <span>${h.type}</span>
                        <span class="${cls}">${amount}</span>
                    </div>`;
        }
        html += `</div>`;
        html += `<div style="margin-top:15px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.08);">
                    <div style="display:flex; justify-content:space-between; font-size:13px; color:rgba(255,255,255,0.7);">
                        <span>Tổng đặt: <strong style="color:white;">${totalBet.toLocaleString()} Xu</strong></span>
                        <span style="color:#99FF66;">Thắng: ${totalWin.toLocaleString()} Xu</span>
                        <span style="color:#ff6b6b;">Thua: ${totalLose.toLocaleString()} Xu</span>
                    </div>
                 </div>`;
    }
    html += `<button onclick="closeModal()" style="width:100%; margin-top:15px; padding:12px; border:none; border-radius:12px; background:linear-gradient(135deg,#1a73e8,#0d47a1); color:white; font-weight:600; cursor:pointer;">Đóng</button>`;
    showModal(html);
}

function showGiftcode() {
    showModal(`
        <h3>GIFTCODE</h3>
        <input class="gift-input" type="text" id="giftInput" placeholder="Nhập mã giftcode...">
        <button class="gift-btn" onclick="redeemGift()">Nhận thưởng</button>
        <div class="gift-msg" id="giftMsg" style="text-align:center; margin-top:10px; font-size:14px; color:rgba(255,255,255,0.3);"></div>
        <button onclick="closeModal()" style="width:100%; margin-top:15px; padding:12px; border:none; border-radius:12px; background:linear-gradient(135deg,#1a73e8,#0d47a1); color:white; font-weight:600; cursor:pointer;">Đóng</button>
    `);
}

function redeemGift() {
    let code = document.getElementById('giftInput').value.trim().toUpperCase();
    let msg = document.getElementById('giftMsg');
    let giftMap = { 'TAIXIU88': 20000, 'VIP2025': 50000, 'LIXI': 10000, 'MDSVIP': 30000 };
    if (!code) {
        msg.textContent = 'Vui lòng nhập mã giftcode!';
        msg.style.color = '#ff6b6b';
        return;
    }
    let used = JSON.parse(localStorage.getItem('giftUsed_' + currentUser) || '[]');
    if (used.includes(code)) {
        msg.textContent = 'Mã giftcode đã được sử dụng!';
        msg.style.color = '#ff6b6b';
        return;
    }
    if (giftMap[code]) {
        let reward = giftMap[code];
        let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
        if (users[currentUser]) {
            users[currentUser].balance += reward;
            localStorage.setItem('taiXiu_users', JSON.stringify(users));
            userBalance = users[currentUser].balance;
            used.push(code);
            localStorage.setItem('giftUsed_' + currentUser, JSON.stringify(used));
            updateSidebarUI();
            msg.textContent = 'Nhận thành công ' + reward.toLocaleString() + ' Xu!';
            msg.style.color = '#99FF66';
            document.getElementById('giftInput').value = '';
        }
    } else {
        msg.textContent = 'Mã giftcode không hợp lệ!';
        msg.style.color = '#ff6b6b';
    }
}

function toggleTheme() {
    darkMode = !darkMode;
    if (darkMode) {
        document.body.style.background = '#0a0a0f';
        document.body.style.color = 'white';
    } else {
        document.body.style.background = '#f0f2f5';
        document.body.style.color = 'black';
    }
    document.getElementById('sidebar').classList.remove('open');
    showStt(darkMode ? 'Chế độ tối' : 'Chế độ sáng', 1500);
}

function handleLogout() {
    if (currentUser) {
        localStorage.removeItem('loggedInUser');
        currentUser = null;
        userBalance = 0;
        currentBetType = null;
        currentBetAmount = 0;
        document.getElementById('gameWrapper').classList.remove('show');
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('sidebar').classList.remove('open');
        setLoginMode();
        setAuthStatus('đã đăng xuất', '');
        gameStart();
    }
}

// ======================= CODE GAME GỐC (GIỮ NGUYÊN) =======================
d1 = document.getElementById("dice1");
d2 = document.getElementById("dice2");
d3 = document.getElementById("dice3");
idGame = document.getElementById("id");
soNguoiChonTai = document.getElementById("usertai");
soNguoiChonXiu = document.getElementById("userxiu");
tongTienDatTai = document.getElementById("sumtai");
tongTienDatXiu = document.getElementById("sumxiu");
time = document.getElementById("time");

gameStart = function() {
    time.style.opacity = 1;
    d1.style.opacity = 0;
    d2.style.opacity = 0;
    d3.style.opacity = 0;
    document.getElementById('dragon').style.webkitAnimationPlayState = 'running';
    document.getElementById("taitxt").style.webkitAnimationPlayState = 'paused';
    document.getElementById("xiutxt").style.webkitAnimationPlayState = 'paused';
    currentBetType = null;
    currentBetAmount = 0;
}

gameOver = function(dice) {
    time.style.opacity = 0;
    roll = document.getElementById("roll");
    document.getElementById('dragon').style.webkitAnimationPlayState = 'paused';
    roll.src = "";
    roll.src = 'imgs/roll1.gif';
    roll.style.opacity = 1;
    setTimeout(() => {
        roll.style.opacity = 0;
        showDice(dice.dice1, dice.dice2, dice.dice3);
        document.getElementById(dice.result + "txt").style.webkitAnimationPlayState = 'running';
        
        // XỬ LÝ THẮNG THUA - CỘNG X2 TIỀN KHI THẮNG
        if (currentUser && currentBetAmount > 0 && currentBetType !== null) {
            let isWin = (currentBetType === dice.result);
            let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
            if (users[currentUser]) {
                if (isWin) {
                    // THẮNG: cộng x2 (tiền cược + tiền thắng = 2x)
                    users[currentUser].balance += currentBetAmount; // cộng thêm số tiền thắng = tiền cược
                    showStt('THẮNG +' + currentBetAmount.toLocaleString() + ' XU', 4000);
                    betHistory.unshift({ time: new Date().toLocaleTimeString(), type: currentBetType.toUpperCase(), amount: currentBetAmount, result: 'THẮNG' });
                } else {
                    showStt('THUA -' + currentBetAmount.toLocaleString() + ' XU', 3000);
                    betHistory.unshift({ time: new Date().toLocaleTimeString(), type: currentBetType.toUpperCase(), amount: currentBetAmount, result: 'THUA' });
                }
                if (betHistory.length > 30) betHistory.pop();
                localStorage.setItem('taiXiu_users', JSON.stringify(users));
                userBalance = users[currentUser].balance;
                updateSidebarUI();
            }
        }
        currentBetType = null;
        currentBetAmount = 0;
    }, 2000);
}

showDice = function(dice1, dice2, dice3) {
    dice = { 1: '0 -2px', 2: '-103px -3px', 3: '-204px -3px', 4: '-305px -3px', 5: '-404px -3px', 6: '-507px -2px' };
    d1.style.background = "url('imgs/dice.png') no-repeat " + dice[dice1];
    d2.style.background = "url('imgs/dice.png') no-repeat " + dice[dice2];
    d3.style.background = "url('imgs/dice.png') no-repeat " + dice[dice3];
    d1.style.opacity = 1;
    d2.style.opacity = 1;
    d3.style.opacity = 1;
}

gameStart();

// ======================= KIỂM TRA ĐĂNG NHẬP TỰ ĐỘNG =======================
let savedUser = localStorage.getItem('loggedInUser');
let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
if (savedUser && users[savedUser]) {
    currentUser = savedUser;
    userBalance = users[savedUser].balance;
    document.getElementById('authContainer').classList.add('hidden');
    document.getElementById('gameWrapper').classList.add('show');
    updateSidebarUI();
    gameStart();
} else {
    document.getElementById('authContainer').classList.remove('hidden');
    document.getElementById('gameWrapper').classList.remove('show');
    setLoginMode();
}

// ======================= SOCKET.IO =======================
var socket = io();

socket.on('gameData', function(data) {
    if (!currentUser) return;
    idGame.innerHTML = '#' + data.idGame;
    soNguoiChonTai.innerHTML = data.soNguoiChonTai;
    soNguoiChonXiu.innerHTML = data.soNguoiChonXiu;
    tongTienDatTai.innerHTML = data.tongTienDatTai / 1000 + 'k';
    tongTienDatXiu.innerHTML = data.tongTienDatXiu / 1000 + 'k';
    time.innerHTML = data.time.toString().length == 1 ? (data.time == 0 ? '' : '0' + data.time) : data.time;
});

socket.on('gameOver', function(data) {
    if (!currentUser) return;
    gameOver(data);
});
socket.on('gameStart', function(data) {
    if (!currentUser) return;
    gameStart();
    showStt('Game bắt đầu');
});
socket.on('pull', function(data) {
    if (!currentUser) return;
    if (data.status == 'success') showStt('Đặt cược thành công');
    else showStt(data.error);
});
socket.on('winGame', function(data) {
    if (!currentUser) return;
    showStt(data.msg, 10000);
});

// ======================= ĐẶT CƯỢC KHÔNG GIỚI HẠN =======================
function placeBet(type, money) {
    if (!currentUser) {
        showStt('VUI LÒNG ĐĂNG NHẬP!', 2000);
        return false;
    }
    if (isNaN(money) || money <= 0) {
        showStt('SỐ TIỀN KHÔNG HỢP LỆ!', 1500);
        return false;
    }
    if (money > userBalance) {
        showStt('KHÔNG ĐỦ XU! BẠN CÓ ' + userBalance.toLocaleString() + ' XU', 2000);
        return false;
    }
    if (currentBetType !== null && currentBetType !== type) {
        showStt('BẠN ĐÃ ĐẶT CỬA ' + currentBetType.toUpperCase() + ', KHÔNG THỂ ĐẶT THÊM CỬA ' + type.toUpperCase(), 2500);
        return false;
    }

    let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
    if (users[currentUser]) {
        users[currentUser].balance -= money;
        localStorage.setItem('taiXiu_users', JSON.stringify(users));
        userBalance = users[currentUser].balance;
        updateSidebarUI();
    }

    currentBetType = type;
    currentBetAmount += money;

    socket.emit('pull', { id: socket.id, dice: type, money: money });
    showStt('ĐẶT ' + type.toUpperCase() + ' +' + money.toLocaleString() + ' XU | TỔNG: ' + currentBetAmount.toLocaleString() + ' XU', 2000);
    return true;
}

// GIỮ NGUYÊN SỰ KIỆN ENTER
document.getElementById('pulltai').addEventListener("keyup", function(event) {
    if (event.key === "Enter" && currentUser) {
        let money = Number(this.value);
        if (placeBet('tai', money)) this.value = '';
    }
});
document.getElementById('pullxiu').addEventListener("keyup", function(event) {
    if (event.key === "Enter" && currentUser) {
        let money = Number(this.value);
        if (placeBet('xiu', money)) this.value = '';
    }
});
</script>
