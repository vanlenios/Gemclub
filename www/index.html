<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Game Tài Xỉu Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
    /* ========== CODE GỐC - GIỮ NGUYÊN ========== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: linear-gradient(135deg, #0a1628 0%, #061a2a 100%);
        font-family: 'Segoe UI', 'Poppins', 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
    }
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 30% 20%, rgba(0,200,255,0.12), rgba(0,80,120,0.08), rgba(0,0,0,0.3));
        pointer-events: none;
        z-index: 0;
    }

    .main {
        background: url('imgs/img.png') no-repeat -1150px -2px;
        width: 771px;
        height: 507px;
        margin: auto;
        position: relative;
        text-align: center;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,200,255,0.4);
        z-index: 1;
    }
    .xiu {
        background: url('imgs/img.png') no-repeat -343px -867px;
        width: 130px;
        height: 74px;
        position: absolute;
        left: 98px;
        top: 190px;
        animation: zoomout 0.2s ease-in-out infinite alternate;
    }
    .tai {
        background: url('imgs/img.png') no-repeat -1290px -870px;
        width: 108px;
        height: 68px;
        position: absolute;
        right: 98px;
        top: 190px;
        animation: zoomout 0.2s ease-in-out infinite alternate;
    }
    .user {
        background: url('imgs/img.png') no-repeat -1970px -416px;
        width: 26px;
        height: 34px;
        position: absolute;
        right: 200px;
        top: 380px;
    }
    .dragon {
        background: url('imgs/img.png') no-repeat -1538px -514px;
        width: 317px;
        height: 309px;
        position: absolute;
        left: 230px;
        top: 130px;
        animation: spin 5s linear infinite;
    }

    .txt {
        padding-top: 410px;
        text-align: center;
    }
    .statustxt {
        font-size: 25px;
        font-weight: bold;
        font-family: "Segoe UI";
        text-shadow: 0 0 5px #000;
        color: #00FFFF;
        transition: 0.5s;
        opacity: 0;
    }
    .usertxt {
        font-size: 25px;
        font-weight: bold;
        font-family: "Segoe UI";
        text-shadow: 0 0 3px #000;
        color: white;
    }
    .dice { position: absolute; }
    .dice1 {
        background: url('imgs/dice.png') no-repeat -507px -2px;
        width: 98px; height: 96px; transform: scale(0.8) rotate(-20deg);
        left: 340px; top: 200px; opacity: 0;
    }
    .dice2 {
        background: url('imgs/dice.png') no-repeat -404px -3px;
        width: 98px; height: 96px; transform: scale(0.8) rotate(20deg);
        left: 300px; top: 270px; opacity: 0;
    }
    .dice3 {
        background: url('imgs/dice.png') no-repeat 0 -2px;
        width: 98px; height: 96px; transform: scale(0.8) rotate(10deg);
        left: 380px; top: 270px; opacity: 0;
    }
    .khung {
        background: url('imgs/img.png') no-repeat -1107px -828px;
        width: 179px; height: 45px; transform: scale(0.6);
        position: absolute; left: 120px; top: 135px;
    }
    .time {
        font-size: 100px; font-family: 'Intro', sans-serif; font-weight: 800;
        text-transform: uppercase;
        background: -webkit-linear-gradient(-86deg, #00FFFF, #0088cc, #00FFFF);
        -webkit-background-clip: text;
        -webkit-text-stroke: 8px transparent;
        color: white;
        position: absolute; left: 320px; top: 200px;
        text-shadow: 0 0 20px rgba(0,200,255,0.5);
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes zoomout { 0% { transform: scale(1.0); } 100% { transform: scale(1.2); } }

    /* ========== MENU 3 GẠCH (MỜ ẢO) ========== */
    .menu-icon {
        position: fixed;
        top: 20px;
        left: 20px;
        font-size: 28px;
        font-weight: bold;
        color: #00FFFF;
        cursor: pointer;
        z-index: 1001;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(12px);
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 15px;
        border: 1px solid rgba(0,200,255,0.6);
        transition: 0.3s;
        font-family: monospace;
    }
    .menu-icon:hover {
        background: rgba(0,200,255,0.25);
        transform: scale(1.02);
        box-shadow: 0 0 15px rgba(0,200,255,0.4);
    }

    /* Sidebar */
    .sidebar {
        position: fixed;
        top: 0;
        left: -320px;
        width: 280px;
        height: 100%;
        background: rgba(8, 12, 25, 0.96);
        backdrop-filter: blur(20px);
        z-index: 1000;
        transition: 0.3s;
        padding: 80px 20px 30px;
        color: white;
        border-right: 1px solid #00CCFF;
        box-shadow: 5px 0 25px rgba(0,0,0,0.4);
        overflow-y: auto;
    }
    .sidebar.open {
        left: 0;
    }
    .sidebar .user-area {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(0,200,255,0.3);
    }
    .sidebar .avatar {
        font-size: 50px;
        margin-bottom: 8px;
        filter: drop-shadow(0 0 10px rgba(0,200,255,0.4));
    }
    .sidebar .username {
        font-size: 18px;
        font-weight: bold;
        color: #00FFFF;
        margin: 8px 0;
    }
    .sidebar .balance {
        font-size: 14px;
        color: #ccc;
        margin-top: 5px;
        background: rgba(0,0,0,0.3);
        display: inline-block;
        padding: 5px 15px;
        border-radius: 30px;
    }
    .sidebar .balance span {
        color: #00FFFF;
        font-weight: bold;
    }
    .sidebar .menu-group {
        margin-bottom: 25px;
    }
    .sidebar .menu-title {
        font-size: 11px;
        color: rgba(0,200,255,0.7);
        letter-spacing: 2px;
        margin-bottom: 12px;
        padding-left: 5px;
        text-transform: uppercase;
    }
    .sidebar .menu-item {
        padding: 12px 18px;
        margin: 5px 0;
        border-radius: 12px;
        background: rgba(255,255,255,0.05);
        cursor: pointer;
        transition: 0.2s;
        font-size: 14px;
        border-left: 2px solid transparent;
    }
    .sidebar .menu-item:hover {
        background: rgba(0,200,255,0.12);
        border-left-color: #00FFFF;
        color: #00FFFF;
        transform: translateX(5px);
    }
    .sidebar .menu-item.logout {
        color: #ffaaaa;
    }
    .sidebar .menu-item.logout:hover {
        background: rgba(255,68,68,0.15);
        border-left-color: #ff6666;
        color: #ffaaaa;
    }

    /* Modal */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(15px);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        visibility: hidden;
        opacity: 0;
        transition: 0.2s;
    }
    .modal.show {
        visibility: visible;
        opacity: 1;
    }
    .modal-content {
        background: rgba(10, 20, 35, 0.96);
        backdrop-filter: blur(20px);
        padding: 25px;
        border-radius: 20px;
        width: 320px;
        text-align: center;
        border: 1px solid #00CCFF;
        box-shadow: 0 0 30px rgba(0,200,255,0.2);
    }
    .modal-content h3 {
        color: #00FFFF;
        font-size: 24px;
        margin-bottom: 20px;
    }
    .modal-content input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 40px;
        background: rgba(0,0,0,0.5);
        border: 1px solid #00CCFF;
        color: white;
        text-align: center;
        font-size: 16px;
        outline: none;
    }
    .modal-content input:focus {
        border-color: #00FFFF;
        box-shadow: 0 0 10px rgba(0,200,255,0.3);
    }
    .modal-content button {
        background: rgba(0,200,255,0.15);
        border: 1px solid #00CCFF;
        padding: 10px 25px;
        border-radius: 40px;
        color: #00FFFF;
        margin: 10px 5px;
        cursor: pointer;
        font-size: 14px;
    }
    .modal-content button:hover {
        background: #00CCFF;
        color: #000;
    }

    /* Lịch sử cược */
    .history-item {
        padding: 8px;
        border-bottom: 1px solid rgba(0,200,255,0.2);
        font-size: 12px;
        display: flex;
        justify-content: space-between;
    }
    .history-tai { color: #00FFFF; }
    .history-xiu { color: #ffffff; }
    .history-win { color: #00FF88; }
    .history-lose { color: #FF6666; }
    </style>
</head>
<body>

<!-- MENU 3 GẠCH -->
<div class="menu-icon" id="menuIcon">☰</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="user-area">
        <div class="avatar" id="avatarIcon">◇</div>
        <div class="username" id="sidebarUsername">KHACH</div>
        <div class="balance">SO DU: <span id="sidebarBalance">0</span> XU</div>
    </div>
    <div class="menu-group">
        <div class="menu-title">TAI KHOAN</div>
        <div class="menu-item" id="menuLogin">DANG NHAP</div>
        <div class="menu-item" id="menuRegister">DANG KY</div>
        <div class="menu-item" id="menuRecharge">NAP TIEN</div>
        <div class="menu-item" id="menuGiftcode">GIFTCODE</div>
    </div>
    <div class="menu-group">
        <div class="menu-title">CAI DAT</div>
        <div class="menu-item" id="menuMusic">NHAC NEN: BAT</div>
        <div class="menu-item" id="menuSettings">CAI DAT CHUNG</div>
    </div>
    <div class="menu-group">
        <div class="menu-title">DU LIEU</div>
        <div class="menu-item" id="menuHistory">LICH SU CUOC</div>
    </div>
    <div class="menu-group">
        <div class="menu-item logout" id="menuLogout" style="display:none;">DANG XUAT</div>
    </div>
</div>

<!-- MODAL CHUNG -->
<div id="appModal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<!-- GAME GỐC - ĐÃ XÓA 2 Ô NHẬP CUOC XIU / CUOC TAI -->
<div class="main">
    <div id="dragon" class="dragon"></div>
    <div class="khung"></div>
    <div id="time" class="time"></div>
    <p id="id" class="statustxt" style="position: absolute; opacity:1; left:180px; top:130px; font-size:17px"></p>
    <div id="taitxt" class="tai"></div>
    <div id="xiutxt" class="xiu"></div>
    <p id="sumxiu" class="usertxt" style="position: absolute; left:115px; top:242px;"></p>
    <p id="sumtai" class="usertxt" style="position: absolute; right:130px; top:242px;"></p>
    <div id="dice1" class="dice dice1"></div>
    <div id="dice2" class="dice dice2"></div>
    <div id="dice3" class="dice dice3"></div>
    <div class="user"></div>
    <div class="user" style="left:80px;"></div>
    <!-- ĐÃ XÓA 2 INPUT pullxiu VÀ pulltai -->
    <img src="" id="roll" style="position: absolute; left:300px; top:190px; transition:0.5s; opacity:0; width:180px"/>
    <p id="userxiu" class="usertxt" style="position: absolute; left:115px; top:352px;"></p>
    <p id="usertai" class="usertxt" style="position: absolute; right:180px; top:352px;"></p>
    <div class="txt">
        <p id="statustxt" class="statustxt"></p>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ======================= CODE GAME GỐC (GIỮ NGUYÊN) =======================
let d1 = document.getElementById("dice1");
let d2 = document.getElementById("dice2");
let d3 = document.getElementById("dice3");
let idGame = document.getElementById("id");
let soNguoiChonTai = document.getElementById("usertai");
let soNguoiChonXiu = document.getElementById("userxiu");
let tongTienDatTai = document.getElementById("sumtai");
let tongTienDatXiu = document.getElementById("sumxiu");
let timeElem = document.getElementById("time");

// Biến cho hệ thống đăng nhập
let currentUser = null;
let userBalance = 0;
let betHistory = [];
let musicEnabled = true;

function updateSidebarUI() {
    if (currentUser) {
        document.getElementById('sidebarUsername').innerHTML = currentUser.toUpperCase();
        document.getElementById('sidebarBalance').innerHTML = userBalance.toLocaleString();
        document.getElementById('menuLogin').style.display = 'none';
        document.getElementById('menuRegister').style.display = 'none';
        document.getElementById('menuLogout').style.display = 'flex';
    } else {
        document.getElementById('sidebarUsername').innerHTML = 'KHACH';
        document.getElementById('sidebarBalance').innerHTML = '0';
        document.getElementById('menuLogin').style.display = 'flex';
        document.getElementById('menuRegister').style.display = 'flex';
        document.getElementById('menuLogout').style.display = 'none';
    }
}

// Hàm gameStart gốc
function gameStart() {
    timeElem.style.opacity = 1;
    d1.style.opacity = 0;
    d2.style.opacity = 0;
    d3.style.opacity = 0;
    document.getElementById('dragon').style.webkitAnimationPlayState = 'running'; 
    document.getElementById("taitxt").style.webkitAnimationPlayState = 'paused';
    document.getElementById("xiutxt").style.webkitAnimationPlayState = 'paused';
}

function showDice(dice1, dice2, dice3) {
    let diceMap = {
        1: '0 -2px',
        2: '-103px -3px',
        3: '-204px -3px',
        4: '-305px -3px',
        5: '-404px -3px',
        6: '-507px -2px',
    };
    d1.style.background = "url('imgs/dice.png') no-repeat " + diceMap[dice1];
    d2.style.background = "url('imgs/dice.png') no-repeat " + diceMap[dice2];
    d3.style.background = "url('imgs/dice.png') no-repeat " + diceMap[dice3];
    d1.style.opacity = 1;
    d2.style.opacity = 1;
    d3.style.opacity = 1;
}

function showStt(msg, timeout = 3000) {
    let stt = document.getElementById('statustxt');
    stt.innerHTML = msg;
    stt.style.opacity = 1;
    setTimeout(() => { stt.style.opacity = 0; }, timeout);
}

function gameOver(dice) {
    timeElem.style.opacity = 0;
    let rollImg = document.getElementById("roll");
    document.getElementById('dragon').style.webkitAnimationPlayState = 'paused'; 
    rollImg.src = "";
    rollImg.src = 'imgs/roll1.gif';
    rollImg.style.opacity = 1;
    setTimeout(() => {
        rollImg.style.opacity = 0;
        showDice(dice.dice1, dice.dice2, dice.dice3);
        document.getElementById(dice.result + "txt").style.webkitAnimationPlayState = 'running';
    }, 2000);
}

gameStart();

let socket = io();

socket.on('gameData', function(data) {
    idGame.innerHTML = '#' + data.idGame;
    soNguoiChonTai.innerHTML = data.soNguoiChonTai;
    soNguoiChonXiu.innerHTML = data.soNguoiChonXiu;
    tongTienDatTai.innerHTML = (data.tongTienDatTai/1000).toFixed(0) + 'k';
    tongTienDatXiu.innerHTML = (data.tongTienDatXiu/1000).toFixed(0) + 'k';
    if(data.time.toString().length == 1){
        timeElem.innerHTML = data.time == 0 ? '' : '0' + data.time;
    } else {
        timeElem.innerHTML = data.time;
    }
});

socket.on('gameOver', function(data) { gameOver(data); });
socket.on('gameStart', function() { gameStart(); showStt('GAME BAT DAU'); });
socket.on('pull', function(data) {
    if(data.status == 'success') showStt('DAT CUOC THANH CONG');
    else showStt(data.error);
});

// ======================= HỆ THỐNG ĐĂNG NHẬP =======================
function showModal(title, inputs, onConfirm) {
    let html = '<h3>' + title + '</h3>';
    for (let i = 0; i < inputs.length; i++) {
        html += '<input type="' + (inputs[i].type || 'text') + '" id="modalInput_' + inputs[i].id + '" placeholder="' + inputs[i].placeholder + '">';
    }
    html += '<div><button id="modalConfirmBtn">XAC NHAN</button> <button id="modalCloseBtn">DONG</button></div>';
    document.getElementById('modalContent').innerHTML = html;
    let modal = document.getElementById('appModal');
    modal.classList.add('show');
    document.getElementById('modalConfirmBtn').onclick = () => {
        let values = {};
        for (let i = 0; i < inputs.length; i++) values[inputs[i].id] = document.getElementById('modalInput_' + inputs[i].id).value;
        onConfirm(values);
        modal.classList.remove('show');
    };
    document.getElementById('modalCloseBtn').onclick = () => modal.classList.remove('show');
}

function register() {
    showModal('DANG KY', [
        { id: 'user', placeholder: 'TEN DANG NHAP', type: 'text' },
        { id: 'pass', placeholder: 'MAT KHAU', type: 'password' }
    ], (vals) => {
        let user = vals.user, pass = vals.pass;
        if (!user || !pass) { showStt('NHAP DAY DU!'); return; }
        let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
        if (users[user]) { showStt('TEN DA TON TAI!'); return; }
        users[user] = { password: pass, balance: 50000 };
        localStorage.setItem('taiXiu_users', JSON.stringify(users));
        showStt('DANG KY THANH CONG! +50,000 XU');
    });
}

function login() {
    showModal('DANG NHAP', [
        { id: 'user', placeholder: 'TEN DANG NHAP', type: 'text' },
        { id: 'pass', placeholder: 'MAT KHAU', type: 'password' }
    ], (vals) => {
        let user = vals.user, pass = vals.pass;
        let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
        if (users[user] && users[user].password === pass) {
            currentUser = user;
            userBalance = users[user].balance;
            updateSidebarUI();
            showStt('CHAO ' + user.toUpperCase() + '! SO DU: ' + userBalance.toLocaleString() + ' XU');
        } else { showStt('SAI TEN HOAC MAT KHAU!'); }
    });
}

function recharge() {
    if (!currentUser) { showStt('DANG NHAP DE NAP TIEN!'); return; }
    showStt('TINH NANG NAP TIEN DANG PHAT TRIEN\nLien he Admin de nap!', 4000);
}

function redeemGiftcode() {
    if (!currentUser) { showStt('DANG NHAP DE NHAN CODE!'); return; }
    showModal('GIFTCODE', [{ id: 'gcode', placeholder: 'NHAP MA CODE', type: 'text' }], (vals) => {
        let code = vals.gcode?.toUpperCase().trim();
        let giftMap = { 'TAIXIU88': 20000, 'VIP2025': 50000, 'LIXI': 10000 };
        let used = JSON.parse(localStorage.getItem('giftUsed_' + currentUser) || '[]');
        if (used.includes(code)) { showStt('CODE DA DUNG!'); return; }
        if (giftMap[code]) {
            let reward = giftMap[code];
            let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
            if (users[currentUser]) {
                users[currentUser].balance += reward;
                localStorage.setItem('taiXiu_users', JSON.stringify(users));
                userBalance = users[currentUser].balance;
                used.push(code);
                localStorage.setItem('giftUsed_' + currentUser, JSON.stringify(used));
                updateSidebarUI();
                showStt('NHAN ' + reward.toLocaleString() + ' XU TU GIFTCODE!');
            }
        } else { showStt('CODE KHONG HOP LE!'); }
    });
}

function showHistory() {
    if (!currentUser) { showStt('DANG NHAP DE XEM LICH SU!'); return; }
    let html = '<h3>LICH SU CUOC</h3>';
    if (betHistory.length === 0) {
        html += '<p>Chua co lich su cuoc</p>';
    } else {
        for (let h of betHistory.slice(0, 20)) {
            let resultClass = h.result === 'THANG' ? 'history-win' : 'history-lose';
            html += `<div class="history-item">
                        <span>${h.time}</span>
                        <span class="${h.type === 'TAI' ? 'history-tai' : 'history-xiu'}">${h.type}</span>
                        <span>${h.amount.toLocaleString()} Xu</span>
                        <span class="${resultClass}">${h.result}</span>
                     </div>`;
        }
    }
    html += '<div><button id="historyCloseBtn" style="margin-top:15px;">DONG</button></div>';
    document.getElementById('modalContent').innerHTML = html;
    let modal = document.getElementById('appModal');
    modal.classList.add('show');
    document.getElementById('historyCloseBtn').onclick = () => modal.classList.remove('show');
}

function toggleMusic() {
    musicEnabled = !musicEnabled;
    let btn = document.getElementById('menuMusic');
    btn.innerHTML = musicEnabled ? 'NHAC NEN: BAT' : 'NHAC NEN: TAT';
    showStt(musicEnabled ? 'DA BAT NHAC' : 'DA TAT NHAC', 1500);
}

function showSettings() {
    showStt('CAI DAT DANG PHAT TRIEN\nCac tinh nang se som cap nhat!', 3000);
}

function logout() {
    if (currentUser) {
        currentUser = null;
        userBalance = 0;
        updateSidebarUI();
        showStt('DA DANG XUAT!');
    }
}

// Gán sự kiện menu
document.getElementById('menuIcon').onclick = () => document.getElementById('sidebar').classList.toggle('open');
document.getElementById('menuLogin').onclick = login;
document.getElementById('menuRegister').onclick = register;
document.getElementById('menuRecharge').onclick = recharge;
document.getElementById('menuGiftcode').onclick = redeemGiftcode;
document.getElementById('menuMusic').onclick = toggleMusic;
document.getElementById('menuSettings').onclick = showSettings;
document.getElementById('menuHistory').onclick = showHistory;
document.getElementById('menuLogout').onclick = logout;

// Đóng sidebar khi click ra ngoài
document.addEventListener('click', (e) => {
    let sidebar = document.getElementById('sidebar');
    let menuBtn = document.getElementById('menuIcon');
    if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== menuBtn && !menuBtn.contains(e.target)) {
        sidebar.classList.remove('open');
    }
});

updateSidebarUI();
</script>
</body>
    </html>
