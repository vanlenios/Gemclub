<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Game Tài Xỉu Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
    /* ========== CODE GỐC GIỮ NGUYÊN ========== */
    body{
        background: #0a0a0f;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .main {
        background: url('imgs/img.png') no-repeat -1150px -2px;
        width: 771px;
        height: 507px;
        margin:auto;
        position: relative;
        text-align: center;
    }
    .xiu {
        background: url('imgs/img.png') no-repeat -343px -867px;
        width: 130px;
        height: 74px;
        position: absolute;
        left: 98px;
        top: 190px;
        animation: zoomout 0.2s ease-in-out infinite alternate;
    }
    .tai {
        background: url('imgs/img.png') no-repeat -1290px -870px;
        width: 108px;
        height: 68px;
        position: absolute;
        right: 98px;
        top: 190px;
        animation: zoomout 0.2s ease-in-out infinite alternate;
    }
    .user {
        background: url('imgs/img.png') no-repeat -1970px -416px;
        width: 26px;
        height: 34px;
        position: absolute;
        right: 200px;
        top: 380px;
    }
    .dragon {
        background: url('imgs/img.png') no-repeat -1538px -514px;
        width: 317px;
        height: 309px;
        position: absolute;
        left: 230px;
        top: 130px;
        animation: spin 5s linear infinite;
    }
    .input{
        width: 200px;
        height: 60px;
        border-radius: 50px;
        position: absolute;
        left: 45px;
        top: 305px;
        outline: 0;
        text-align: center;
        font-size: 30px;
        background: rgba(0,0,0,0.6);
        border: 1px solid #00FFFF;
        color : #fff;
    }

    .txt{
        padding-top: 410px;
        text-align: center;
        top: 300px;
    }
    .statustxt{
        font-size: 25px;
        font-weight: bold;
        font-family: "Segoe UI";
        top: 500px;
        text-shadow: 0 0 3px #000;
        color: #00FFFF;
        transition: 0.5s;
        opacity: 0;
    }
    .usertxt{
        font-size: 25px;
        font-weight: bold;
        font-family: "Segoe UI";
        top: 500px;
        text-shadow: 0 0 3px #000;
        color: white;
    }
    .dice{
        position: absolute;
    }
    .dice1{
        background: url('imgs/dice.png') no-repeat -507px -2px;
        width: 98px;
        height: 96px;
        transform: scale(0.8) rotate(-20deg);
        left: 340px;
        top: 200px;
        opacity: 0;
    }
    .dice2{
        background: url('imgs/dice.png') no-repeat -404px -3px;
        width: 98px;
        height: 96px;
        transform: scale(0.8) rotate(20deg);
        left: 300px;
        top: 270px;
        opacity: 0;
    }
    .dice3{
        background: url('imgs/dice.png') no-repeat 0 -2px;
        width: 98px;
        height: 96px;
        transform: scale(0.8) rotate(10deg);
        left: 380px;
        top: 270px;
        opacity: 0;
    }
    .khung {
        background: url('imgs/img.png') no-repeat -1107px -828px;
        width: 179px;
        height: 45px;
        transform: scale(0.6);
        position: absolute;
        left: 120px;
        top: 135px;
    }
    .time{
        font-size: 100px;
        font-family: 'Intro', sans-serif;
        font-weight: 800;
        text-transform: uppercase;
        background: -webkit-linear-gradient(-86deg, #660610 5%, black 53%, #0A99B8 91%);
        -webkit-background-clip: text;
        -webkit-text-stroke: 8px transparent;
        color: white;
        position: absolute;
        left: 320px;
        top: 200px;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    @keyframes zoomout {
        0% { transform: scale(1.0); }
        100% { transform: scale(1.2); }
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
    }

    /* ========== PHẦN THÊM MỚI (MENU 3 GẠCH) ========== */
    
    /* Menu 3 gạch */
    .menu-icon {
        position: fixed;
        top: 20px;
        left: 20px;
        font-size: 28px;
        font-weight: bold;
        color: #00FFFF;
        cursor: pointer;
        z-index: 1001;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(12px);
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        border: 1px solid #00FFFF;
        transition: 0.3s;
    }
    .menu-icon:hover {
        background: rgba(0,255,255,0.2);
        transform: scale(1.02);
    }

    /* Sidebar mờ ảo */
    .sidebar {
        position: fixed;
        top: 0;
        left: -320px;
        width: 280px;
        height: 100%;
        background: rgba(8, 8, 12, 0.96);
        backdrop-filter: blur(20px);
        z-index: 1000;
        transition: 0.3s;
        padding: 80px 20px 30px;
        color: white;
        border-right: 1px solid #00FFFF;
        box-shadow: 5px 0 25px rgba(0,0,0,0.5);
    }
    .sidebar.open {
        left: 0;
    }
    .sidebar .user-area {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(0,255,255,0.3);
    }
    .sidebar .avatar {
        font-size: 50px;
        margin-bottom: 8px;
    }
    .sidebar .username {
        font-size: 18px;
        font-weight: bold;
        color: #00FFFF;
        margin: 5px 0;
    }
    .sidebar .balance {
        font-size: 14px;
        color: #ccc;
        margin-top: 5px;
    }
    .sidebar .balance span {
        color: #00FFFF;
        font-weight: bold;
    }
    .sidebar .menu-group {
        margin-bottom: 20px;
    }
    .sidebar .menu-title {
        font-size: 12px;
        color: #888;
        letter-spacing: 2px;
        margin-bottom: 10px;
        padding-left: 5px;
    }
    .sidebar .menu-item {
        padding: 12px 15px;
        margin: 4px 0;
        border-radius: 12px;
        background: rgba(255,255,255,0.05);
        cursor: pointer;
        transition: 0.2s;
        font-size: 14px;
        border-left: 2px solid transparent;
    }
    .sidebar .menu-item:hover {
        background: rgba(0,255,255,0.12);
        border-left-color: #00FFFF;
        color: #00FFFF;
    }
    .sidebar .menu-item.logout {
        color: #ff8888;
    }
    .sidebar .menu-item.logout:hover {
        background: rgba(255,68,68,0.15);
        border-left-color: #ff6666;
        color: #ff8888;
    }

    /* Modal */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(12px);
        z-index: 1200;
        display: flex;
        align-items: center;
        justify-content: center;
        visibility: hidden;
        opacity: 0;
        transition: 0.2s;
    }
    .modal.show {
        visibility: visible;
        opacity: 1;
    }
    .modal-content {
        background: rgba(12, 12, 18, 0.95);
        backdrop-filter: blur(16px);
        padding: 25px;
        border-radius: 20px;
        width: 320px;
        text-align: center;
        border: 1px solid #00FFFF;
    }
    .modal-content h3 {
        color: #00FFFF;
        font-size: 22px;
        margin-bottom: 20px;
    }
    .modal-content input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        background: rgba(0,0,0,0.5);
        border: 1px solid #00FFFF;
        color: white;
        text-align: center;
        outline: none;
    }
    .modal-content button {
        background: rgba(0,255,255,0.15);
        border: 1px solid #00FFFF;
        padding: 8px 20px;
        border-radius: 12px;
        color: #00FFFF;
        margin: 10px 5px;
        cursor: pointer;
    }
    .modal-content button:hover {
        background: #00FFFF;
        color: #000;
    }

    /* Lịch sử cược modal */
    .history-item {
        padding: 8px;
        border-bottom: 1px solid rgba(0,255,255,0.2);
        font-size: 12px;
        text-align: left;
    }
    .history-tai { color: #00FFFF; }
    .history-xiu { color: #ffffff; }
    </style>
</head>
<body>

<!-- MENU 3 GẠCH -->
<div class="menu-icon" id="menuIcon">☰</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="user-area">
        <div class="avatar" id="avatarIcon">👤</div>
        <div class="username" id="sidebarUsername">KHÁCH</div>
        <div class="balance">Số dư: <span id="sidebarBalance">0</span> Xu</div>
    </div>
    
    <div class="menu-group">
        <div class="menu-title">TÀI KHOẢN</div>
        <div class="menu-item" id="menuLogin">Đăng nhập</div>
        <div class="menu-item" id="menuRegister">Đăng ký</div>
        <div class="menu-item" id="menuRecharge">Nạp tiền</div>
        <div class="menu-item" id="menuGiftcode">Giftcode</div>
    </div>
    
    <div class="menu-group">
        <div class="menu-title">CÀI ĐẶT</div>
        <div class="menu-item" id="menuMusic">Nhạc nền: BẬT</div>
        <div class="menu-item" id="menuSettings">Cài đặt chung</div>
    </div>
    
    <div class="menu-group">
        <div class="menu-title">DỮ LIỆU</div>
        <div class="menu-item" id="menuHistory">Lịch sử cược</div>
    </div>
    
    <div class="menu-group">
        <div class="menu-item logout" id="menuLogout" style="display:none;">Đăng xuất</div>
    </div>
</div>

<!-- MODAL CHUNG -->
<div id="appModal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<!-- GAME GỐC -->
<div class="main">
    <div id="dragon" class="dragon"></div>
    <div class="khung"></div>
    <div id="time" class="time"></div>
    <p id="id" class="statustxt" style="position: absolute; opacity:1; left:180px; top:130px; font-size:17px"></p>
    <div id="taitxt" class="tai"></div>
    <div id="xiutxt" class="xiu"></div>
    <p id="sumxiu" class="usertxt" style="position: absolute; left:115px; top:242px;"></p>
    <p id="sumtai" class="usertxt" style="position: absolute; right:130px; top:242px;"></p>
    <div id="dice1" class="dice dice1"></div>
    <div id="dice2" class="dice dice2"></div>
    <div id="dice3" class="dice dice3"></div>
    <div class="user"></div>
    <div class="user" style="left:80px;"></div>
    <input id="pullxiu" class="input" type="number">
    <input id="pulltai" class="input" type="number" style="left:525px;">
    <img src="" id="roll" style="position: absolute; left:300px; top:190px; transition:0.5s; opacity:0; width:180px"/>
    <p id="userxiu" class="usertxt" style="position: absolute; left:115px; top:352px;"></p>
    <p id="usertai" class="usertxt" style="position: absolute; right:180px; top:352px;"></p>
    <div class="txt">
        <p id="statustxt" class="statustxt"></p>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ======================= CODE GAME GỐC (GIỮ NGUYÊN) =======================
let d1 = document.getElementById("dice1");
let d2 = document.getElementById("dice2");
let d3 = document.getElementById("dice3");
let idGame = document.getElementById("id");
let soNguoiChonTai = document.getElementById("usertai");
let soNguoiChonXiu = document.getElementById("userxiu");
let tongTienDatTai = document.getElementById("sumtai");
let tongTienDatXiu = document.getElementById("sumxiu");
let timeElem = document.getElementById("time");

let currentUser = null;
let userBalance = 0;
let betHistory = []; // Lưu lịch sử cược
let musicEnabled = true;

function gameStart() {
    timeElem.style.opacity = 1;
    d1.style.opacity = 0;
    d2.style.opacity = 0;
    d3.style.opacity = 0;
    document.getElementById('dragon').style.webkitAnimationPlayState = 'running';
    document.getElementById("taitxt").style.webkitAnimationPlayState = 'paused';
    document.getElementById("xiutxt").style.webkitAnimationPlayState = 'paused';
}

function showDice(dice1, dice2, dice3) {
    let diceMap = {
        1: '0 -2px',
        2: '-103px -3px',
        3: '-204px -3px',
        4: '-305px -3px',
        5: '-404px -3px',
        6: '-507px -2px',
    };
    d1.style.background = "url('imgs/dice.png') no-repeat " + diceMap[dice1];
    d2.style.background = "url('imgs/dice.png') no-repeat " + diceMap[dice2];
    d3.style.background = "url('imgs/dice.png') no-repeat " + diceMap[dice3];
    d1.style.opacity = 1;
    d2.style.opacity = 1;
    d3.style.opacity = 1;
}

function showStt(msg, timeout = 3000) {
    let stt = document.getElementById('statustxt');
    stt.innerHTML = msg;
    stt.style.opacity = 1;
    setTimeout(() => { stt.style.opacity = 0; }, timeout);
}

let lastBetAmount = 0;
let lastBetType = null;

function gameOver(dice) {
    timeElem.style.opacity = 0;
    let rollImg = document.getElementById("roll");
    document.getElementById('dragon').style.webkitAnimationPlayState = 'paused';
    rollImg.src = "";
    rollImg.src = 'imgs/roll1.gif';
    rollImg.style.opacity = 1;
    setTimeout(() => {
        rollImg.style.opacity = 0;
        showDice(dice.dice1, dice.dice2, dice.dice3);
        document.getElementById(dice.result + "txt").style.webkitAnimationPlayState = 'running';
        
        // Xử lý thắng thua và lưu lịch sử
        if (currentUser && lastBetAmount > 0) {
            let isWin = (lastBetType === dice.result);
            let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
            if (users[currentUser]) {
                if (isWin) {
                    users[currentUser].balance += lastBetAmount;
                    showStt('THẮNG +' + lastBetAmount.toLocaleString() + ' XU', 4000);
                    betHistory.unshift({ time: new Date().toLocaleTimeString(), type: lastBetType.toUpperCase(), amount: lastBetAmount, result: 'THẮNG' });
                } else {
                    showStt('THUA -' + lastBetAmount.toLocaleString() + ' XU', 3000);
                    betHistory.unshift({ time: new Date().toLocaleTimeString(), type: lastBetType.toUpperCase(), amount: lastBetAmount, result: 'THUA' });
                }
                if (betHistory.length > 30) betHistory.pop();
                localStorage.setItem('taiXiu_users', JSON.stringify(users));
                userBalance = users[currentUser].balance;
                updateSidebarUI();
            }
        }
        lastBetAmount = 0;
        lastBetType = null;
    }, 2000);
}

gameStart();

let socket = io();

socket.on('gameData', function(data) {
    idGame.innerHTML = '#' + data.idGame;
    soNguoiChonTai.innerHTML = data.soNguoiChonTai;
    soNguoiChonXiu.innerHTML = data.soNguoiChonXiu;
    tongTienDatTai.innerHTML = (data.tongTienDatTai/1000).toFixed(0) + 'k';
    tongTienDatXiu.innerHTML = (data.tongTienDatXiu/1000).toFixed(0) + 'k';
    timeElem.innerHTML = data.time.toString().length == 1 ? (data.time == 0 ? '' : '0' + data.time) : data.time;
});

socket.on('gameOver', function(data) { gameOver(data); });
socket.on('gameStart', function() { gameStart(); showStt('Game bắt đầu'); });
socket.on('pull', function(data) {
    if (data.status == 'success') showStt('Đặt cược thành công');
    else showStt(data.error);
});
socket.on('winGame', function(data) { showStt(data.msg, 10000); });

// Hàm đặt cược có kiểm tra số dư
function placeBet(type, money) {
    if (!currentUser) { showStt('VUI LÒNG ĐĂNG NHẬP!', 2000); return false; }
    if (isNaN(money) || money <= 0) { showStt('SỐ TIỀN KHÔNG HỢP LỆ!', 1500); return false; }
    if (money > userBalance) { showStt('KHÔNG ĐỦ XU! BẠN CÓ ' + userBalance.toLocaleString() + ' XU', 2000); return false; }
    if (lastBetAmount > 0) { showStt('ĐÃ ĐẶT CƯỢC VÁN NÀY RỒI!', 1500); return false; }
    
    let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
    if (users[currentUser]) {
        users[currentUser].balance -= money;
        localStorage.setItem('taiXiu_users', JSON.stringify(users));
        userBalance = users[currentUser].balance;
        updateSidebarUI();
    }
    
    lastBetAmount = money;
    lastBetType = type;
    socket.emit('pull', { id: socket.id, dice: type, money: money });
    return true;
}

// GIỮ NGUYÊN SỰ KIỆN ENTER CỦA GAME GỐC
document.getElementById('pulltai').addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
        let money = Number(document.getElementById('pulltai').value);
        if (placeBet('tai', money)) document.getElementById('pulltai').value = '';
    }
});
document.getElementById('pullxiu').addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
        let money = Number(document.getElementById('pullxiu').value);
        if (placeBet('xiu', money)) document.getElementById('pullxiu').value = '';
    }
});

// ======================= HỆ THỐNG ĐĂNG NHẬP (THÊM MỚI) =======================
function updateSidebarUI() {
    if (currentUser) {
        document.getElementById('sidebarUsername').innerHTML = currentUser.toUpperCase();
        document.getElementById('sidebarBalance').innerHTML = userBalance.toLocaleString();
        document.getElementById('menuLogin').style.display = 'none';
        document.getElementById('menuRegister').style.display = 'none';
        document.getElementById('menuLogout').style.display = 'flex';
    } else {
        document.getElementById('sidebarUsername').innerHTML = 'KHÁCH';
        document.getElementById('sidebarBalance').innerHTML = '0';
        document.getElementById('menuLogin').style.display = 'flex';
        document.getElementById('menuRegister').style.display = 'flex';
        document.getElementById('menuLogout').style.display = 'none';
    }
}

function showModal(title, inputs, onConfirm) {
    let html = '<h3>' + title + '</h3>';
    for (let i = 0; i < inputs.length; i++) {
        html += '<input type="' + (inputs[i].type || 'text') + '" id="modalInput_' + inputs[i].id + '" placeholder="' + inputs[i].placeholder + '">';
    }
    html += '<div><button id="modalConfirmBtn">XÁC NHẬN</button> <button id="modalCloseBtn">ĐÓNG</button></div>';
    document.getElementById('modalContent').innerHTML = html;
    let modal = document.getElementById('appModal');
    modal.classList.add('show');
    document.getElementById('modalConfirmBtn').onclick = () => {
        let values = {};
        for (let i = 0; i < inputs.length; i++) values[inputs[i].id] = document.getElementById('modalInput_' + inputs[i].id).value;
        onConfirm(values);
        modal.classList.remove('show');
    };
    document.getElementById('modalCloseBtn').onclick = () => modal.classList.remove('show');
}

function register() {
    showModal('ĐĂNG KÝ', [
        { id: 'user', placeholder: 'TÊN ĐĂNG NHẬP', type: 'text' },
        { id: 'pass', placeholder: 'MẬT KHẨU', type: 'password' }
    ], (vals) => {
        let user = vals.user, pass = vals.pass;
        if (!user || !pass) { showStt('NHẬP ĐẦY ĐỦ!'); return; }
        let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
        if (users[user]) { showStt('TÊN ĐÃ TỒN TẠI!'); return; }
        users[user] = { password: pass, balance: 50000 };
        localStorage.setItem('taiXiu_users', JSON.stringify(users));
        showStt('ĐĂNG KÝ THÀNH CÔNG! +50000 XU');
    });
}

function login() {
    showModal('ĐĂNG NHẬP', [
        { id: 'user', placeholder: 'TÊN ĐĂNG NHẬP', type: 'text' },
        { id: 'pass', placeholder: 'MẬT KHẨU', type: 'password' }
    ], (vals) => {
        let user = vals.user, pass = vals.pass;
        let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
        if (users[user] && users[user].password === pass) {
            currentUser = user;
            userBalance = users[user].balance;
            updateSidebarUI();
            showStt('CHÀO ' + user.toUpperCase() + '! SỐ DƯ: ' + userBalance.toLocaleString() + ' XU');
        } else {
            showStt('SAI TÊN HOẶC MẬT KHẨU!');
        }
    });
}

function recharge() {
    if (!currentUser) { showStt('ĐĂNG NHẬP ĐỂ NẠP TIỀN!'); return; }
    showModal('NẠP XU', [{ id: 'amount', placeholder: 'SỐ XU NẠP', type: 'number' }], (vals) => {
        let amount = parseInt(vals.amount);
        if (isNaN(amount) || amount <= 0) { showStt('SỐ TIỀN KHÔNG HỢP LỆ!'); return; }
        let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
        if (users[currentUser]) {
            users[currentUser].balance += amount;
            localStorage.setItem('taiXiu_users', JSON.stringify(users));
            userBalance = users[currentUser].balance;
            updateSidebarUI();
            showStt('NẠP THÀNH CÔNG +' + amount.toLocaleString() + ' XU!');
        }
    });
}

function redeemGiftcode() {
    if (!currentUser) { showStt('ĐĂNG NHẬP ĐỂ NHẬN CODE!'); return; }
    showModal('GIFTCODE', [{ id: 'gcode', placeholder: 'NHẬP MÃ CODE', type: 'text' }], (vals) => {
        let code = vals.gcode?.toUpperCase().trim();
        let giftMap = { 'TAIXIU88': 20000, 'VIP2025': 50000, 'LIXI': 10000 };
        let used = JSON.parse(localStorage.getItem('giftUsed_' + currentUser) || '[]');
        if (used.includes(code)) { showStt('CODE ĐÃ DÙNG!'); return; }
        if (giftMap[code]) {
            let reward = giftMap[code];
            let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
            if (users[currentUser]) {
                users[currentUser].balance += reward;
                localStorage.setItem('taiXiu_users', JSON.stringify(users));
                userBalance = users[currentUser].balance;
                used.push(code);
                localStorage.setItem('giftUsed_' + currentUser, JSON.stringify(used));
                updateSidebarUI();
                showStt('NHẬN ' + reward.toLocaleString() + ' XU TỪ GIFTCODE!');
            }
        } else { showStt('CODE KHÔNG HỢP LỆ!'); }
    });
}

function showHistory() {
    if (!currentUser) { showStt('ĐĂNG NHẬP ĐỂ XEM LỊCH SỬ!'); return; }
    let html = '<h3>LỊCH SỬ CƯỢC</h3>';
    if (betHistory.length === 0) {
        html += '<p>Chưa có lịch sử cược</p>';
    } else {
        for (let h of betHistory.slice(0, 20)) {
            let colorClass = h.result === 'THẮNG' ? 'history-tai' : 'history-xiu';
            html += `<div class="history-item"><span>${h.time}</span> - <span class="${colorClass}">${h.type}</span> - ${h.amount.toLocaleString()} Xu - <span>${h.result}</span></div>`;
        }
    }
    html += '<div><button id="historyCloseBtn">ĐÓNG</button></div>';
    document.getElementById('modalContent').innerHTML = html;
    let modal = document.getElementById('appModal');
    modal.classList.add('show');
    document.getElementById('historyCloseBtn').onclick = () => modal.classList.remove('show');
}

function toggleMusic() {
    musicEnabled = !musicEnabled;
    let btn = document.getElementById('menuMusic');
    btn.innerHTML = musicEnabled ? 'Nhạc nền: BẬT' : 'Nhạc nền: TẮT';
    showStt(musicEnabled ? 'ĐÃ BẬT NHẠC' : 'ĐÃ TẮT NHẠC', 1500);
}

function showSettings() {
    showStt('CÀI ĐẶT ĐANG PHÁT TRIỂN');
}

function logout() {
    if (currentUser) {
        currentUser = null;
        userBalance = 0;
        lastBetAmount = 0;
        lastBetType = null;
        updateSidebarUI();
        showStt('ĐÃ ĐĂNG XUẤT!');
    }
}

// ===== GÁN SỰ KIỆN CHO MENU =====
document.getElementById('menuIcon').onclick = () => document.getElementById('sidebar').classList.toggle('open');
document.getElementById('menuLogin').onclick = login;
document.getElementById('menuRegister').onclick = register;
document.getElementById('menuRecharge').onclick = recharge;
document.getElementById('menuGiftcode').onclick = redeemGiftcode;
document.getElementById('menuMusic').onclick = toggleMusic;
document.getElementById('menuSettings').onclick = showSettings;
document.getElementById('menuHistory').onclick = showHistory;
document.getElementById('menuLogout').onclick = logout;

// Đóng sidebar khi click ra ngoài
document.addEventListener('click', (e) => {
    let sidebar = document.getElementById('sidebar');
    let menuBtn = document.getElementById('menuIcon');
    if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== menuBtn && !menuBtn.contains(e.target)) {
        sidebar.classList.remove('open');
    }
});

updateSidebarUI();
</script>
</body>
