<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Game Tài Xỉu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a1220,#061a2a);font-family:'Segoe UI','Poppins',sans-serif;min-height:100vh;padding:12px;position:relative}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 20%,rgba(0,200,255,0.12),rgba(0,80,120,0.08),rgba(0,0,0,0.3));pointer-events:none;z-index:0}

/* GAME GỐC */
.main{background:url('imgs/img.png') no-repeat -1150px -2px;width:100%;max-width:771px;height:auto;aspect-ratio:771/507;margin:auto;position:relative;text-align:center;border-radius:30px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.4),0 0 0 1px rgba(0,200,255,0.5);z-index:1}
.xiu{background:url('imgs/img.png') no-repeat -343px -867px;width:130px;height:74px;position:absolute;left:12%;top:37%;animation:zoomout .2s ease-in-out infinite alternate}
.tai{background:url('imgs/img.png') no-repeat -1290px -870px;width:108px;height:68px;position:absolute;right:12%;top:37%;animation:zoomout .2s ease-in-out infinite alternate}
.dragon{background:url('imgs/img.png') no-repeat -1538px -514px;width:317px;height:309px;position:absolute;left:30%;top:25%;animation:spin 5s linear infinite}
.input{width:200px;height:60px;border-radius:50px;position:absolute;left:6%;top:60%;outline:0;text-align:center;font-size:30px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:2px solid #0cf;color:#fff;font-weight:bold}
.input:focus{border-color:#0ff;box-shadow:0 0 15px rgba(0,200,255,0.5)}
.txt{padding-top:80%;text-align:center}
.statustxt{font-size:20px;font-weight:bold;color:#0ff;transition:.5s;opacity:0}
.usertxt{font-size:18px;font-weight:bold;color:#fff}
.dice{position:absolute}
.dice1{background:url('imgs/dice.png') no-repeat -507px -2px;width:98px;height:96px;transform:scale(0.8) rotate(-20deg);left:44%;top:39%;opacity:0}
.dice2{background:url('imgs/dice.png') no-repeat -404px -3px;width:98px;height:96px;transform:scale(0.8) rotate(20deg);left:39%;top:53%;opacity:0}
.dice3{background:url('imgs/dice.png') no-repeat 0 -2px;width:98px;height:96px;transform:scale(0.8) rotate(10deg);left:49%;top:53%;opacity:0}
.khung{background:url('imgs/img.png') no-repeat -1107px -828px;width:179px;height:45px;transform:scale(0.6);position:absolute;left:15%;top:26%}
.time{font-size:80px;font-family:'Intro',sans-serif;font-weight:800;text-transform:uppercase;background:-webkit-linear-gradient(-86deg,#0ff,#08c,#0ff);-webkit-background-clip:text;-webkit-text-stroke:8px transparent;color:#fff;position:absolute;left:42%;top:39%;text-shadow:0 0 25px rgba(0,200,255,0.6)}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes zoomout{0%{transform:scale(1)}100%{transform:scale(1.2)}}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

/* MENU 3 GẠCH */
.menu-icon{position:fixed;top:12px;left:12px;font-size:26px;font-weight:bold;color:#0ff;cursor:pointer;z-index:1001;background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid rgba(0,200,255,0.6);transition:.3s}
.menu-icon:hover{background:rgba(0,200,255,0.25);transform:scale(1.02)}
.sidebar{position:fixed;top:0;left:-280px;width:260px;height:100%;background:rgba(8,12,25,0.96);backdrop-filter:blur(20px);z-index:1000;transition:.3s;padding:70px 15px 20px;color:#fff;border-right:1px solid #0cf;overflow-y:auto}
.sidebar.open{left:0}
.sidebar .user-area{text-align:center;margin-bottom:25px;padding-bottom:15px;border-bottom:1px solid rgba(0,200,255,0.3)}
.sidebar .avatar{font-size:45px;margin-bottom:5px}
.sidebar .username{font-size:16px;font-weight:bold;color:#0ff}
.sidebar .balance{font-size:12px;color:#ccc;margin-top:5px;background:rgba(0,0,0,0.3);display:inline-block;padding:4px 12px;border-radius:30px}
.sidebar .balance span{color:#0ff;font-weight:bold}
.sidebar .menu-group{margin-bottom:20px}
.sidebar .menu-title{font-size:10px;color:rgba(0,200,255,0.7);letter-spacing:2px;margin-bottom:10px;padding-left:5px}
.sidebar .menu-item{padding:10px 15px;margin:4px 0;border-radius:10px;background:rgba(255,255,255,0.05);cursor:pointer;transition:.2s;font-size:13px}
.sidebar .menu-item:hover{background:rgba(0,200,255,0.12);color:#0ff}
.sidebar .menu-item.logout{color:#ffaaaa}
.sidebar .menu-item.logout:hover{background:rgba(255,68,68,0.15)}

/* PANEL ĐẶT CƯỢC - TỐI ƯU ĐT */
.bet-panel{max-width:771px;margin:12px auto 0;background:rgba(0,15,25,0.8);backdrop-filter:blur(18px);border-radius:24px;padding:15px;border:1px solid rgba(0,200,255,0.5);z-index:1;position:relative}
.bet-row{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap}
.bet-input{background:rgba(0,0,0,0.6);border:2px solid #0cf;border-radius:50px;padding:12px;font-size:18px;width:180px;text-align:center;color:#0ff;font-weight:bold;outline:none}
.bet-input:focus{border-color:#0ff;box-shadow:0 0 12px rgba(0,200,255,0.5)}
.bet-btn{background:rgba(0,200,255,0.15);border:2px solid #0cf;border-radius:50px;padding:10px 20px;font-size:16px;font-weight:bold;color:#0ff;cursor:pointer;transition:.2s}
.bet-btn:hover{background:#0cf;color:#000;transform:scale(1.02)}
.cancel-btn{background:rgba(255,80,80,0.15);border-color:#f66;color:#f88}
.cancel-btn:hover{background:#f66;color:#000}
.my-bet-info{text-align:center;padding:10px;margin-top:12px;background:rgba(0,0,0,0.4);border-radius:20px;color:#0ff;font-weight:bold;font-size:16px}
.user-info-text{text-align:center;margin-top:10px;padding:8px;background:rgba(0,0,0,0.3);border-radius:40px;color:#0ff;font-weight:bold;font-size:14px}

/* THÔNG BÁO LỖI RIÊNG */
.error-msg{text-align:center;margin-top:10px;padding:6px;background:rgba(255,80,80,0.2);border-radius:25px;color:#ff8888;font-size:13px;font-weight:bold;border:1px solid #f66;transition:.3s;opacity:0}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(15px);z-index:2000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:.2s}
.modal.show{visibility:visible;opacity:1}
.modal-content{background:rgba(10,20,35,0.96);backdrop-filter:blur(20px);padding:25px;border-radius:20px;width:300px;text-align:center;border:1px solid #0cf}
.modal-content h3{color:#0ff;font-size:22px;margin-bottom:15px}
.modal-content input{width:100%;padding:12px;margin:10px 0;border-radius:50px;background:rgba(0,0,0,0.5);border:1px solid #0cf;color:#fff;text-align:center}
.modal-content button{background:rgba(0,200,255,0.2);border:1px solid #0cf;padding:8px 20px;border-radius:50px;color:#0ff;margin:10px 5px;cursor:pointer}
.modal-content button:hover{background:#0cf;color:#000}
</style>
</head>
<body>

<div class="menu-icon" id="menuIcon">☰</div>
<div class="sidebar" id="sidebar">
<div class="user-area"><div class="avatar" id="avatarIcon">◇</div><div class="username" id="sidebarUsername">KHACH</div><div class="balance">SO DU: <span id="sidebarBalance">0</span> XU</div></div>
<div class="menu-group"><div class="menu-title">TAI KHOAN</div><div class="menu-item" id="menuLogin">DANG NHAP</div><div class="menu-item" id="menuRegister">DANG KY</div><div class="menu-item" id="menuRecharge">NAP TIEN</div><div class="menu-item" id="menuGiftcode">GIFTCODE</div></div>
<div class="menu-group"><div class="menu-title">CAI DAT</div><div class="menu-item" id="menuMusic">NHAC NEN: BAT</div><div class="menu-item" id="menuSettings">CAI DAT CHUNG</div></div>
<div class="menu-group"><div class="menu-title">DU LIEU</div><div class="menu-item" id="menuHistory">LICH SU CUOC</div></div>
<div class="menu-group"><div class="menu-item logout" id="menuLogout" style="display:none">DANG XUAT</div></div>
</div>

<div>
<div class="main">
<div id="dragon" class="dragon"></div>
<div class="khung"></div>
<div id="time" class="time"></div>
<p id="id" class="statustxt" style="position:absolute;opacity:1;left:23%;top:25%;font-size:14px"></p>
<div id="taitxt" class="tai"></div>
<div id="xiutxt" class="xiu"></div>
<p id="sumxiu" class="usertxt" style="position:absolute;left:15%;top:47%"></p>
<p id="sumtai" class="usertxt" style="position:absolute;right:17%;top:47%"></p>
<div id="dice1" class="dice dice1"></div>
<div id="dice2" class="dice dice2"></div>
<div id="dice3" class="dice dice3"></div>
<div class="user"></div>
<div class="user" style="left:10%"></div>
<input id="pullxiu" class="input" type="number" placeholder="CUOC XIU">
<input id="pulltai" class="input" type="number" placeholder="CUOC TAI" style="left:66%">
<img src="" id="roll" style="position:absolute;left:39%;top:37%;transition:.5s;opacity:0;width:160px">
<p id="userxiu" class="usertxt" style="position:absolute;left:15%;top:69%"></p>
<p id="usertai" class="usertxt" style="position:absolute;right:23%;top:69%"></p>
<div class="txt"><p id="statustxt" class="statustxt"></p></div>
</div>

<div class="bet-panel">
<div class="bet-row">
<input type="number" id="betAmountInput" class="bet-input" placeholder="NHAP SO TIEN">
<button id="btnBetTai" class="bet-btn">DAT TAI</button>
<button id="btnBetXiu" class="bet-btn">DAT XIU</button>
<button id="btnCancelBet" class="bet-btn cancel-btn">HUY CUOC</button>
</div>
<div class="my-bet-info" id="myBetInfo">TAI: 0 XU | XIU: 0 XU</div>
<div id="errorMsg" class="error-msg"></div>
<div id="userInfoDiv"></div>
</div>
</div>

<div id="appModal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
let d1=document.getElementById("dice1"),d2=document.getElementById("dice2"),d3=document.getElementById("dice3"),idGame=document.getElementById("id"),soNguoiChonTai=document.getElementById("usertai"),soNguoiChonXiu=document.getElementById("userxiu"),tongTienDatTai=document.getElementById("sumtai"),tongTienDatXiu=document.getElementById("sumxiu"),timeElem=document.getElementById("time");

let currentUser=null,userBalance=0,currentBetType=null,currentBetAmount=0,betHistory=[],musicEnabled=true;

function showErrorMsg(msg){
    let errDiv=document.getElementById('errorMsg');
    errDiv.innerHTML=msg;
    errDiv.style.opacity='1';
    setTimeout(()=>{errDiv.style.opacity='0';},2500);
}

function updateMyBetDisplay(){
    let taiAmt=(currentBetType==='tai')?currentBetAmount:0;
    let xiuAmt=(currentBetType==='xiu')?currentBetAmount:0;
    document.getElementById('myBetInfo').innerHTML='TAI: '+taiAmt.toLocaleString()+' XU | XIU: '+xiuAmt.toLocaleString()+' XU';
}
function updateSidebarUI(){
    if(currentUser){
        document.getElementById('sidebarUsername').innerHTML=currentUser.toUpperCase();
        document.getElementById('sidebarBalance').innerHTML=userBalance.toLocaleString();
        document.getElementById('menuLogin').style.display='none';
        document.getElementById('menuRegister').style.display='none';
        document.getElementById('menuLogout').style.display='flex';
    }else{
        document.getElementById('sidebarUsername').innerHTML='KHACH';
        document.getElementById('sidebarBalance').innerHTML='0';
        document.getElementById('menuLogin').style.display='flex';
        document.getElementById('menuRegister').style.display='flex';
        document.getElementById('menuLogout').style.display='none';
    }
    let div=document.getElementById('userInfoDiv');
    if(currentUser){
        div.innerHTML='<div class="user-info-text">'+currentUser.toUpperCase()+' | SO DU: '+userBalance.toLocaleString()+' XU</div>';
    }else{
        div.innerHTML='';
    }
}
function gameStart(){
    timeElem.style.opacity=1;
    d1.style.opacity=0;d2.style.opacity=0;d3.style.opacity=0;
    document.getElementById('dragon').style.webkitAnimationPlayState='running';
    document.getElementById("taitxt").style.webkitAnimationPlayState='paused';
    document.getElementById("xiutxt").style.webkitAnimationPlayState='paused';
    currentBetType=null;
    currentBetAmount=0;
    updateMyBetDisplay();
}
function showDice(a,b,c){
    let m={1:'0 -2px',2:'-103px -3px',3:'-204px -3px',4:'-305px -3px',5:'-404px -3px',6:'-507px -2px'};
    d1.style.background="url('imgs/dice.png') no-repeat "+m[a];
    d2.style.background="url('imgs/dice.png') no-repeat "+m[b];
    d3.style.background="url('imgs/dice.png') no-repeat "+m[c];
    d1.style.opacity=1;d2.style.opacity=1;d3.style.opacity=1;
}
function showStt(msg,t=3000){
    let s=document.getElementById('statustxt');
    s.innerHTML=msg;s.style.opacity=1;
    setTimeout(()=>{s.style.opacity=0;},t);
}
function gameOver(dice){
    timeElem.style.opacity=0;
    let rollImg=document.getElementById("roll");
    document.getElementById('dragon').style.webkitAnimationPlayState='paused';
    rollImg.src="imgs/roll1.gif";
    rollImg.style.opacity=1;
    setTimeout(()=>{
        rollImg.style.opacity=0;
        showDice(dice.dice1,dice.dice2,dice.dice3);
        document.getElementById(dice.result+"txt").style.webkitAnimationPlayState='running';
        if(currentUser&&currentBetAmount>0&&currentBetType!==null){
            let win=(currentBetType===dice.result);
            let users=JSON.parse(localStorage.getItem('taiXiu_users')||'{}');
            if(users[currentUser]){
                if(win){
                    users[currentUser].balance+=currentBetAmount;
                    showStt('THANG +'+currentBetAmount.toLocaleString()+' XU',4000);
                    betHistory.unshift({time:new Date().toLocaleTimeString(),type:currentBetType.toUpperCase(),amount:currentBetAmount,result:'THANG'});
                }else{
                    showStt('THUA -'+currentBetAmount.toLocaleString()+' XU',3000);
                    betHistory.unshift({time:new Date().toLocaleTimeString(),type:currentBetType.toUpperCase(),amount:currentBetAmount,result:'THUA'});
                }
                if(betHistory.length>30)betHistory.pop();
                localStorage.setItem('taiXiu_users',JSON.stringify(users));
                userBalance=users[currentUser].balance;
                updateSidebarUI();
            }
        }
        currentBetType=null;currentBetAmount=0;
        updateMyBetDisplay();
    },2000);
}
gameStart();
let socket=io();
socket.on('gameData',function(d){
    idGame.innerHTML='#'+d.idGame;
    soNguoiChonTai.innerHTML=d.soNguoiChonTai;
    soNguoiChonXiu.innerHTML=d.soNguoiChonXiu;
    tongTienDatTai.innerHTML=(d.tongTienDatTai/1000).toFixed(0)+'k';
    tongTienDatXiu.innerHTML=(d.tongTienDatXiu/1000).toFixed(0)+'k';
    timeElem.innerHTML=d.time.toString().length==1?(d.time==0?'':'0'+d.time):d.time;
});
socket.on('gameOver',function(d){gameOver(d);});
socket.on('gameStart',function(){gameStart();showStt('GAME BAT DAU');});
socket.on('pull',function(d){if(d.status=='success')showStt('DAT CUOC THANH CONG');else showErrorMsg(d.error);});

function placeBet(type,money){
    if(!currentUser){showErrorMsg('VUI LONG DANG NHAP!');return false;}
    if(isNaN(money)||money<=0){showErrorMsg('SO TIEN KHONG HOP LE!');return false;}
    if(money>userBalance){showErrorMsg('KHONG DU XU! BAN CO '+userBalance.toLocaleString()+' XU');return false;}
    if(currentBetType!==null&&currentBetType!==type){showErrorMsg('BAN DA DAT CUA '+currentBetType.toUpperCase()+', KHONG THE DAT THEM CUA '+type.toUpperCase());return false;}
    let users=JSON.parse(localStorage.getItem('taiXiu_users')||'{}');
    if(users[currentUser]){
        users[currentUser].balance-=money;
        localStorage.setItem('taiXiu_users',JSON.stringify(users));
        userBalance=users[currentUser].balance;
        updateSidebarUI();
    }
    currentBetType=type;
    currentBetAmount+=money;
    updateMyBetDisplay();
    socket.emit('pull',{id:socket.id,dice:type,money:money});
    showStt('DAT '+type.toUpperCase()+' +'+money.toLocaleString()+' XU | TONG: '+currentBetAmount.toLocaleString()+' XU',2000);
    document.getElementById('betAmountInput').value='';
    return true;
}
function cancelBet(){
    if(!currentUser){showErrorMsg('VUI LONG DANG NHAP!');return;}
    if(currentBetAmount===0){showErrorMsg('KHONG CO CUOC DE HUY!');return;}
    let users=JSON.parse(localStorage.getItem('taiXiu_users')||'{}');
    if(users[currentUser]){
        users[currentUser].balance+=currentBetAmount;
        localStorage.setItem('taiXiu_users',JSON.stringify(users));
        userBalance=users[currentUser].balance;
        currentBetAmount=0;
        currentBetType=null;
        updateMyBetDisplay();
        updateSidebarUI();
        showStt('DA HUY CUOC, HOAN TIEN',1500);
    }
}
function showModal(title,inputs,onConfirm){
    let html='<h3>'+title+'</h3>';
    for(let i=0;i<inputs.length;i++){html+='<input type="'+(inputs[i].type||'text')+'" id="modalInput_'+inputs[i].id+'" placeholder="'+inputs[i].placeholder+'">';}
    html+='<div><button id="modalConfirmBtn">XAC NHAN</button> <button id="modalCloseBtn">DONG</button></div>';
    document.getElementById('modalContent').innerHTML=html;
    let modal=document.getElementById('appModal');
    modal.classList.add('show');
    document.getElementById('modalConfirmBtn').onclick=()=>{
        let vals={};
        for(let i=0;i<inputs.length;i++){vals[inputs[i].id]=document.getElementById('modalInput_'+inputs[i].id).value;}
        onConfirm(vals);
        modal.classList.remove('show');
    };
    document.getElementById('modalCloseBtn').onclick=()=>modal.classList.remove('show');
}
function register(){
    showModal('DANG KY',[{id:'user',placeholder:'TEN DANG NHAP'},{id:'pass',placeholder:'MAT KHAU',type:'password'}],(v)=>{
        let u=v.user,p=v.pass;
        if(!u||!p){showErrorMsg('NHAP DAY DU!');return;}
        let users=JSON.parse(localStorage.getItem('taiXiu_users')||'{}');
        if(users[u]){showErrorMsg('TEN DA TON TAI!');return;}
        users[u]={password:p,balance:50000};
        localStorage.setItem('taiXiu_users',JSON.stringify(users));
        showStt('DANG KY THANH CONG! +50,000 XU');
    });
}
function login(){
    showModal('DANG NHAP',[{id:'user',placeholder:'TEN DANG NHAP'},{id:'pass',placeholder:'MAT KHAU',type:'password'}],(v)=>{
        let u=v.user,p=v.pass;
        let users=JSON.parse(localStorage.getItem('taiXiu_users')||'{}');
        if(users[u]&&users[u].password===p){
            currentUser=u;
            userBalance=users[u].balance;
            updateSidebarUI();
            showStt('CHAO '+u.toUpperCase()+'! SO DU: '+userBalance.toLocaleString()+' XU');
        }else{showErrorMsg('SAI TEN HOAC MAT KHAU!');}
    });
}
function recharge(){if(!currentUser){showErrorMsg('DANG NHAP DE NAP TIEN!');return;}showStt('TINH NANG NAP TIEN DANG PHAT TRIEN',4000);}
function redeemGiftcode(){
    if(!currentUser){showErrorMsg('DANG NHAP DE NHAN CODE!');return;}
    showModal('GIFTCODE',[{id:'gcode',placeholder:'NHAP MA CODE'}],(v)=>{
        let code=v.gcode?.toUpperCase().trim();
        let gift={'TAIXIU88':20000,'VIP2025':50000,'LIXI':10000};
        let used=JSON.parse(localStorage.getItem('giftUsed_'+currentUser)||'[]');
        if(used.includes(code)){showErrorMsg('CODE DA DUNG!');return;}
        if(gift[code]){
            let reward=gift[code];
            let users=JSON.parse(localStorage.getItem('taiXiu_users')||'{}');
            if(users[currentUser]){
                users[currentUser].balance+=reward;
                localStorage.setItem('taiXiu_users',JSON.stringify(users));
                userBalance=users[currentUser].balance;
                used.push(code);
                localStorage.setItem('giftUsed_'+currentUser,JSON.stringify(used));
                updateSidebarUI();
                showStt('NHAN '+reward.toLocaleString()+' XU TU GIFTCODE!');
            }
        }else{showErrorMsg('CODE KHONG HOP LE!');}
    });
}
function showHistory(){
    if(!currentUser){showErrorMsg('DANG NHAP DE XEM LICH SU!');return;}
    let html='<h3>LICH SU CUOC</h3>';
    if(betHistory.length===0){html+='<p>Chua co lich su cuoc</p>';}
    else{
        for(let h of betHistory.slice(0,20)){
            html+=`<div style="padding:8px;border-bottom:1px solid rgba(0,200,255,0.2);display:flex;justify-content:space-between"><span>${h.time}</span><span style="color:#0ff">${h.type}</span><span>${h.amount.toLocaleString()} Xu</span><span style="color:${h.result==='THANG'?'#0f8':'#f66'}">${h.result}</span></div>`;
        }
    }
    html+='<div><button id="historyCloseBtn" style="margin-top:15px;">DONG</button></div>';
    document.getElementById('modalContent').innerHTML=html;
    let modal=document.getElementById('appModal');
    modal.classList.add('show');
    document.getElementById('historyCloseBtn').onclick=()=>modal.classList.remove('show');
}
function toggleMusic(){
    musicEnabled=!musicEnabled;
    let btn=document.getElementById('menuMusic');
    btn.innerHTML=musicEnabled?'NHAC NEN: BAT':'NHAC NEN: TAT';
    showStt(musicEnabled?'DA BAT NHAC':'DA TAT NHAC',1500);
}
function showSettings(){showStt('CAI DAT DANG PHAT TRIEN',3000);}
function logout(){
    if(currentUser){
        currentUser=null;
        userBalance=0;
        currentBetAmount=0;
        currentBetType=null;
        updateMyBetDisplay();
        updateSidebarUI();
        showStt('DA DANG XUAT!');
    }
}
document.getElementById('btnBetTai').onclick=()=>{let m=Number(document.getElementById('betAmountInput').value);placeBet('tai',m);};
document.getElementById('btnBetXiu').onclick=()=>{let m=Number(document.getElementById('betAmountInput').value);placeBet('xiu',m);};
document.getElementById('btnCancelBet').onclick=cancelBet;
document.getElementById('menuIcon').onclick=()=>document.getElementById('sidebar').classList.toggle('open');
document.getElementById('menuLogin').onclick=login;
document.getElementById('menuRegister').onclick=register;
document.getElementById('menuRecharge').onclick=recharge;
