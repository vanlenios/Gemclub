<script src="/socket.io/socket.io.js"></script>
<script>
// ======================= BIẾN TOÀN CỤC =======================
let currentUser = null;
let userBalance = 0;
let currentBetType = null;
let currentBetAmount = 0;
let betHistory = [];
let cauHistory = [];
let darkMode = true;
let isLoginMode = true;
let soundEnabled = true;
let cauVisible = false;
let audioCtx = null; // Audio Context cho Web Audio API

// ======================= ÂM THANH (WEB AUDIO API - KHÔNG CẦN FILE) =======================
function initAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) {}
}

function playSound(type) {
    if (!soundEnabled || !audioCtx) return;
    try {
        let osc, gain;
        const now = audioCtx.currentTime;
        
        switch(type) {
            case 'click':
                // Âm thanh click ngắn
                osc = audioCtx.createOscillator();
                gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 800;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
                break;
                
            case 'roll':
                // Âm thanh lắc xí ngầu (nhiễu trắng)
                const bufferSize = audioCtx.sampleRate * 0.3;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.1));
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                gain = audioCtx.createGain();
                gain.gain.value = 0.2;
                noise.connect(gain);
                gain.connect(audioCtx.destination);
                noise.start(now);
                noise.stop(now + 0.3);
                break;
                
            case 'win':
                // Âm thanh thắng (chuỗi nốt nhạc vui)
                const notes = [523.25, 659.25, 784.0, 1046.5];
                notes.forEach((freq, i) => {
                    osc = audioCtx.createOscillator();
                    gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.15, now + i * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.15);
                    osc.start(now + i * 0.08);
                    osc.stop(now + i * 0.08 + 0.15);
                });
                break;
                
            case 'lose':
                // Âm thanh thua (nốt trầm buồn)
                osc = audioCtx.createOscillator();
                gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 300;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
                break;
        }
    } catch(e) {}
}

// ======================= SOI CẦU =======================
function addCauResult(result) {
    cauHistory.unshift(result);
    if (cauHistory.length > 30) cauHistory.pop();
    updateCauDisplay();
}
function updateCauDisplay() {
    let container = document.getElementById('cauThanh');
    if (!container) return;
    container.innerHTML = '';
    for (let i = 0; i < cauHistory.length; i++) {
        let cham = document.createElement('div');
        cham.className = 'cau-cham';
        if (cauHistory[i] === 'tai') { cham.classList.add('cau-tai'); cham.innerHTML = 'T'; }
        else if (cauHistory[i] === 'xiu') { cham.classList.add('cau-xiu'); cham.innerHTML = 'X'; }
        container.appendChild(cham);
    }
    for (let i = cauHistory.length; i < 20; i++) {
        let cham = document.createElement('div');
        cham.className = 'cau-cham cau-cham-empty';
        cham.innerHTML = '?';
        container.appendChild(cham);
    }
}
function toggleCau() {
    cauVisible = !cauVisible;
    document.getElementById('cauContainer').style.display = cauVisible ? 'block' : 'none';
    document.getElementById('sidebar').classList.remove('open');
    showStt(cauVisible ? 'Hien thi soi cau' : 'An soi cau', 1500);
}

// ======================= HÀM TIỆN ÍCH =======================
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function showModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('modalOverlay').classList.add('show'); }
function showStt(msg, timeout = 3000) { let stt = document.getElementById('statustxt'); stt.innerHTML = msg; stt.style.opacity = 1; setTimeout(() => { stt.style.opacity = 0; }, timeout); }
function showToast(msg) { let toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = msg; document.body.appendChild(toast); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000); }
function setAuthStatus(msg, type) { let status = document.getElementById('authStatus'); status.textContent = msg; status.className = 'auth-status'; if (type === 'error') status.classList.add('error'); else if (type === 'success') status.classList.add('success'); }
function updateSidebarUI() { if (currentUser) { document.getElementById('sidebarUser').textContent = currentUser.toUpperCase(); document.getElementById('sidebarBalance').textContent = userBalance.toLocaleString(); } }
function setLoginMode() { isLoginMode = true; document.getElementById('authTitle').textContent = 'DANG NHAP'; document.getElementById('authSubtitle').textContent = 'truy cap tai khoan game'; document.getElementById('loginEmail').classList.add('hidden'); document.getElementById('btnLogin').textContent = 'DANG NHAP'; document.getElementById('btnRegister').textContent = 'DANG KY'; document.getElementById('authStatus').textContent = 'dang nhap de tiep tuc'; document.getElementById('authStatus').className = 'auth-status'; }
function setRegisterMode() { isLoginMode = false; document.getElementById('authTitle').textContent = 'DANG KY'; document.getElementById('authSubtitle').textContent = 'tao tai khoan moi'; document.getElementById('loginEmail').classList.remove('hidden'); document.getElementById('btnLogin').textContent = 'DANG NHAP'; document.getElementById('btnRegister').textContent = 'DANG KY'; document.getElementById('authStatus').textContent = 'dang ky tai khoan moi'; document.getElementById('authStatus').className = 'auth-status'; }

// ======================= ĐĂNG KÝ =======================
function handleRegister() {
    if (isLoginMode) { setRegisterMode(); return; }
    let user = document.getElementById("loginUser").value.trim();
    let email = document.getElementById("loginEmail").value.trim();
    let pass = document.getElementById("loginPass").value.trim();
    if (!user || !email || !pass) { setAuthStatus('Vui long nhap day du thong tin!', 'error'); return; }
    if (!email.includes('@') || !email.includes('.')) { setAuthStatus('Email khong hop le!', 'error'); return; }
    let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
    if (users[user]) { setAuthStatus('Ten dang nhap da ton tai!', 'error'); return; }
    users[user] = { password: pass, email: email, balance: 50000, vip: 1, createdAt: new Date().toDateString(), loginAttempts: 0, locked: false };
    localStorage.setItem('taiXiu_users', JSON.stringify(users));
    setAuthStatus('Dang ky thanh cong! Hay dang nhap', 'success');
    document.getElementById("loginUser").value = ""; document.getElementById("loginEmail").value = ""; document.getElementById("loginPass").value = "";
    setLoginMode();
    playSound('click');
}

// ======================= ĐĂNG NHẬP =======================
function handleLogin() {
    if (!isLoginMode) { setLoginMode(); document.getElementById("loginEmail").value = ""; setAuthStatus('dang nhap de tiep tuc', ''); return; }
    let user = document.getElementById("loginUser").value.trim();
    let pass = document.getElementById("loginPass").value.trim();
    if (!user || !pass) { setAuthStatus('Vui long nhap ten va mat khau!', 'error'); return; }
    let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
    if (users[user] && users[user].locked) { setAuthStatus('Tai khoan bi khoa! Lien he Admin.', 'error'); return; }
    if (users[user] && users[user].password === pass) {
        users[user].loginAttempts = 0; users[user].locked = false;
        currentUser = user; userBalance = users[user].balance;
        localStorage.setItem('loggedInUser', user);
        let loginHistory = JSON.parse(localStorage.getItem('loginHistory_' + user) || '[]');
        loginHistory.unshift({ time: new Date().toLocaleString(), device: navigator.userAgent || 'unknown' });
        if (loginHistory.length > 50) loginHistory.pop();
        localStorage.setItem('loginHistory_' + user, JSON.stringify(loginHistory));
        users[user].lastSeen = new Date().toISOString(); users[user].lastActive = new Date().toDateString();
        localStorage.setItem('taiXiu_users', JSON.stringify(users));
        setAuthStatus('Dang nhap thanh cong · chao ' + user, 'success');
        document.getElementById("loginUser").value = ""; document.getElementById("loginPass").value = "";
        playSound('click');
        setTimeout(() => { document.getElementById('authContainer').classList.add('hidden'); document.getElementById('gameWrapper').classList.add('show'); document.getElementById('cauContainer').style.display = 'block'; updateSidebarUI(); gameStart(); }, 500);
    } else if (!users[user]) { setRegisterMode(); setAuthStatus('Tai khoan khong ton tai, nhap email de dang ky', 'error'); }
    else {
        users[user].loginAttempts = (users[user].loginAttempts || 0) + 1;
        if (users[user].loginAttempts >= 5) { users[user].locked = true; setAuthStatus('Tai khoan bi khoa do nhap sai qua 5 lan!', 'error'); }
        else { setAuthStatus('Sai tai khoan hoac mat khau! (' + users[user].loginAttempts + '/5)', 'error'); }
        localStorage.setItem('taiXiu_users', JSON.stringify(users));
    }
}

// ======================= MENU 3 GẠCH =======================
document.getElementById('menuIcon').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); });
document.addEventListener('click', function(e) { let sidebar = document.getElementById('sidebar'); let menuIcon = document.getElementById('menuIcon'); if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== menuIcon) { sidebar.classList.remove('open'); } });

// ======================= CHỨC NĂNG MENU =======================
function showBalance() { showModal(`<h3>SO DU</h3><p style="font-size:28px;text-align:center;color:#ffd700;margin:20px 0;">${userBalance.toLocaleString()} Xu</p><button onclick="closeModal()" style="width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:white;font-weight:600;cursor:pointer;">Dong</button>`); playSound('click'); }
function showHistory() {
    let html = `<h3>LICH SU CHOI</h3>`;
    if (betHistory.length === 0) { html += `<p style="text-align:center;color:rgba(255,255,255,0.3);">Chua co lich su choi</p>`; }
    else {
        html += `<div style="max-height:300px;overflow-y:auto;">`;
        let totalWin = 0, totalLose = 0, totalBet = 0;
        for (let h of betHistory.slice(0, 30)) {
            let cls = h.result === 'THANG' ? 'win' : 'lose';
            let amount = h.result === 'THANG' ? '+' + h.amount.toLocaleString() : '-' + h.amount.toLocaleString();
            if (h.result === 'THANG') totalWin += h.amount; else totalLose += h.amount;
            totalBet += h.amount;
            html += `<div class="history-item"><span>${h.time}</span><span>${h.type}</span><span class="${cls}">${amount}</span></div>`;
        }
        html += `</div>`;
        html += `<div style="margin-top:15px;padding-top:15px;border-top:1px solid rgba(255,255,255,0.08);"><div style="display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,0.7);"><span>Tong dat: <strong style="color:white;">${totalBet.toLocaleString()} Xu</strong></span><span style="color:#99FF66;">Thang: ${totalWin.toLocaleString()} Xu</span><span style="color:#ff6b6b;">Thua: ${totalLose.toLocaleString()} Xu</span></div></div>`;
    }
    html += `<button onclick="closeModal()" style="width:100%;margin-top:15px;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:white;font-weight:600;cursor:pointer;">Dong</button>`;
    showModal(html);
    playSound('click');
}
function toggleMusic() { 
    soundEnabled = !soundEnabled; 
    document.getElementById('sidebar').classList.remove('open'); 
    showStt(soundEnabled ? 'Da bat am thanh' : 'Da tat am thanh', 1500); 
    if (soundEnabled) playSound('click'); 
}
function toggleTheme() { darkMode = !darkMode; if (darkMode) { document.body.style.background = '#0a0a0f'; document.body.style.color = 'white'; } else { document.body.style.background = '#f0f2f5'; document.body.style.color = 'black'; } document.getElementById('sidebar').classList.remove('open'); showStt(darkMode ? 'Che do toi' : 'Che do sang', 1500); playSound('click'); }
function handleLogout() { if (currentUser) { localStorage.removeItem('loggedInUser'); currentUser = null; userBalance = 0; currentBetType = null; currentBetAmount = 0; document.getElementById('gameWrapper').classList.remove('show'); document.getElementById('authContainer').classList.remove('hidden'); document.getElementById('cauContainer').style.display = 'none'; document.getElementById('sidebar').classList.remove('open'); setLoginMode(); setAuthStatus('da dang xuat', ''); gameStart(); playSound('click'); } }

// ======================= CODE GAME GỐC =======================
d1 = document.getElementById("dice1"); d2 = document.getElementById("dice2"); d3 = document.getElementById("dice3");
idGame = document.getElementById("id"); soNguoiChonTai = document.getElementById("usertai"); soNguoiChonXiu = document.getElementById("userxiu");
tongTienDatTai = document.getElementById("sumtai"); tongTienDatXiu = document.getElementById("sumxiu"); time = document.getElementById("time");

gameStart = function() {
    time.style.opacity = 1; d1.style.opacity = 0; d2.style.opacity = 0; d3.style.opacity = 0;
    document.getElementById('dragon').style.webkitAnimationPlayState = 'running';
    document.getElementById("taitxt").style.webkitAnimationPlayState = 'paused';
    document.getElementById("xiutxt").style.webkitAnimationPlayState = 'paused';
    currentBetType = null; currentBetAmount = 0;
}

gameOver = function(dice) {
    time.style.opacity = 0; roll = document.getElementById("roll");
    document.getElementById('dragon').style.webkitAnimationPlayState = 'paused';
    roll.src = ""; roll.src = 'imgs/roll1.gif'; roll.style.opacity = 1;
    setTimeout(() => {
        roll.style.opacity = 0; showDice(dice.dice1, dice.dice2, dice.dice3);
        document.getElementById(dice.result + "txt").style.webkitAnimationPlayState = 'running';
        addCauResult(dice.result);
        if (currentUser && currentBetAmount > 0 && currentBetType !== null) {
            let isWin = (currentBetType === dice.result);
            let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
            if (users[currentUser]) {
                if (isWin) {
                    users[currentUser].balance += currentBetAmount;
                    showStt('THANG +' + currentBetAmount.toLocaleString() + ' XU', 4000);
                    betHistory.unshift({ time: new Date().toLocaleTimeString(), type: currentBetType.toUpperCase(), amount: currentBetAmount, result: 'THANG' });
                    playSound('win');
                } else {
                    showStt('THUA -' + currentBetAmount.toLocaleString() + ' XU', 3000);
                    betHistory.unshift({ time: new Date().toLocaleTimeString(), type: currentBetType.toUpperCase(), amount: currentBetAmount, result: 'THUA' });
                    playSound('lose');
                }
                if (betHistory.length > 30) betHistory.pop();
                localStorage.setItem('taiXiu_users', JSON.stringify(users));
                userBalance = users[currentUser].balance;
                updateSidebarUI();
            }
        }
        currentBetType = null; currentBetAmount = 0;
    }, 2000);
}

showDice = function(dice1, dice2, dice3) {
    dice = { 1: '0 -2px', 2: '-103px -3px', 3: '-204px -3px', 4: '-305px -3px', 5: '-404px -3px', 6: '-507px -2px' };
    d1.style.background = "url('imgs/dice.png') no-repeat " + dice[dice1];
    d2.style.background = "url('imgs/dice.png') no-repeat " + dice[dice2];
    d3.style.background = "url('imgs/dice.png') no-repeat " + dice[dice3];
    d1.style.opacity = 1; d2.style.opacity = 1; d3.style.opacity = 1;
}

gameStart();

// ======================= KIỂM TRA ĐĂNG NHẬP TỰ ĐỘNG =======================
let savedUser = localStorage.getItem('loggedInUser');
let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
if (savedUser && users[savedUser]) {
    currentUser = savedUser; userBalance = users[savedUser].balance;
    document.getElementById('authContainer').classList.add('hidden');
    document.getElementById('gameWrapper').classList.add('show');
    document.getElementById('cauContainer').style.display = 'block';
    updateSidebarUI(); gameStart();
} else { document.getElementById('authContainer').classList.remove('hidden'); document.getElementById('gameWrapper').classList.remove('show'); document.getElementById('cauContainer').style.display = 'none'; setLoginMode(); }

// ======================= SOCKET.IO =======================
var socket = io();
socket.on('gameData', function(data) { if (!currentUser) return; idGame.innerHTML = '#' + data.idGame; soNguoiChonTai.innerHTML = data.soNguoiChonTai; soNguoiChonXiu.innerHTML = data.soNguoiChonXiu; tongTienDatTai.innerHTML = (data.tongTienDatTai/1000).toFixed(0) + 'k'; tongTienDatXiu.innerHTML = (data.tongTienDatXiu/1000).toFixed(0) + 'k'; time.innerHTML = data.time.toString().length == 1 ? (data.time == 0 ? '' : '0' + data.time) : data.time; });
socket.on('gameOver', function(data) { if (!currentUser) return; playSound('roll'); gameOver(data); });
socket.on('gameStart', function(data) { if (!currentUser) return; gameStart(); showStt('Game bat dau'); });
socket.on('pull', function(data) { if (!currentUser) return; if (data.status == 'success') { showStt('Dat cuoc thanh cong'); playSound('click'); } else showStt(data.error); });
socket.on('winGame', function(data) { if (!currentUser) return; showStt(data.msg, 10000); });

// ======================= ĐẶT CƯỢC =======================
function placeBet(type, money) {
    if (!currentUser) { showStt('VUI LONG DANG NHAP!', 2000); return false; }
    if (isNaN(money) || money <= 0) { showStt('SO TIEN KHONG HOP LE!', 1500); return false; }
    if (money > userBalance) { showStt('KHONG DU XU! BAN CO ' + userBalance.toLocaleString() + ' XU', 2000); return false; }
    if (currentBetType !== null && currentBetType !== type) { showStt('BAN DA DAT CUA ' + currentBetType.toUpperCase() + ', KHONG THE DAT THEM CUA ' + type.toUpperCase(), 2500); return false; }
    let users = JSON.parse(localStorage.getItem('taiXiu_users') || '{}');
    if (users[currentUser]) { users[currentUser].balance -= money; localStorage.setItem('taiXiu_users', JSON.stringify(users)); userBalance = users[currentUser].balance; updateSidebarUI(); }
    currentBetType = type; currentBetAmount += money;
    socket.emit('pull', { id: socket.id, dice: type, money: money });
    showStt('DAT ' + type.toUpperCase() + ' +' + money.toLocaleString() + ' XU | TONG: ' + currentBetAmount.toLocaleString() + ' XU', 2000);
    playSound('click');
    return true;
}

document.getElementById('pulltai').addEventListener("keyup", function(event) { if (event.key === "Enter" && currentUser) { let money = Number(this.value); if (placeBet('tai', money)) this.value = ''; } });
document.getElementById('pullxiu').addEventListener("keyup", function(event) { if (event.key === "Enter" && currentUser) { let money = Number(this.value); if (placeBet('xiu', money)) this.value = ''; } });
