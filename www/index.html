<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Game Tài Xỉu - Theme Chuyển Đổi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* ========== RESET & FONTS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #7b00b4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ========== THEME MẶC ĐỊNH (TÍM) ========== */
        body.purple-theme {
            background: #7b00b4;
        }

        body.purple-theme .main {
            background: url('imgs/img.png') no-repeat -1150px -2px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }

        /* ========== THEME XANH TRẮNG (SAU KHI NHẤN MENU) ========== */
        body.cyan-theme {
            background: linear-gradient(145deg, #0b2b40 0%, #06212e 100%);
        }

        body.cyan-theme .main {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.3);
        }

        body.cyan-theme .xiu,
        body.cyan-theme .tai,
        body.cyan-theme .user,
        body.cyan-theme .dragon,
        body.cyan-theme .khung {
            filter: brightness(1.1) drop-shadow(0 0 6px rgba(0,255,255,0.6));
        }

        body.cyan-theme .time {
            background: -webkit-linear-gradient(-86deg, #c0ffee 5%, #80ffea 53%, #00b8ff 91%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0,255,255,0.7);
        }

        body.cyan-theme .statustxt,
        body.cyan-theme .usertxt {
            text-shadow: 0 0 6px #00ffff;
            color: #e0ffff;
        }

        body.cyan-theme .input {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* ========== MAIN GAME CŨ (GIỮ NGUYÊN) ========== */
        .main {
            background: url('imgs/img.png') no-repeat -1150px -2px;
            width: 771px;
            height: 507px;
            margin: auto;
            position: relative;
            text-align: center;
            border-radius: 32px;
            transition: all 0.4s;
        }

        .xiu {
            background: url('imgs/img.png') no-repeat -343px -867px;
            width: 130px;
            height: 74px;
            position: absolute;
            left: 98px;
            top: 190px;
            animation: zoomout 0.2s ease-in-out infinite alternate;
        }

        .tai {
            background: url('imgs/img.png') no-repeat -1290px -870px;
            width: 108px;
            height: 68px;
            position: absolute;
            right: 98px;
            top: 190px;
            animation: zoomout 0.2s ease-in-out infinite alternate;
        }

        .user {
            background: url('imgs/img.png') no-repeat -1970px -416px;
            width: 26px;
            height: 34px;
            position: absolute;
            right: 200px;
            top: 380px;
        }

        .dragon {
            background: url('imgs/img.png') no-repeat -1538px -514px;
            width: 317px;
            height: 309px;
            position: absolute;
            left: 230px;
            top: 130px;
            animation: spin 5s linear infinite;
        }

        .input {
            width: 200px;
            height: 60px;
            border-radius: 50px;
            position: absolute;
            left: 45px;
            top: 305px;
            outline: 0;
            text-align: center;
            font-size: 30px;
            background: 0;
            border: 0;
            color: #fff;
            transition: 0.2s;
        }

        .txt {
            padding-top: 410px;
            text-align: center;
            top: 300px;
        }

        .statustxt {
            font-size: 25px;
            font-weight: bold;
            font-family: "Segoe UI";
            top: 500px;
            text-shadow: 0 0 3px #000;
            color: yellow;
            transition: 0.5s;
            opacity: 0;
        }

        .usertxt {
            font-size: 25px;
            font-weight: bold;
            font-family: "Segoe UI";
            top: 500px;
            text-shadow: 0 0 3px #000;
            color: white;
        }

        .dice {
            position: absolute;
        }

        .dice1 {
            background: url('imgs/dice.png') no-repeat -507px -2px;
            width: 98px;
            height: 96px;
            transform: scale(0.8) rotate(-20deg);
            left: 340px;
            top: 200px;
            opacity: 0;
        }

        .dice2 {
            background: url('imgs/dice.png') no-repeat -404px -3px;
            width: 98px;
            height: 96px;
            transform: scale(0.8) rotate(20deg);
            left: 300px;
            top: 270px;
            opacity: 0;
        }

        .dice3 {
            background: url('imgs/dice.png') no-repeat 0 -2px;
            width: 98px;
            height: 96px;
            transform: scale(0.8) rotate(10deg);
            left: 380px;
            top: 270px;
            opacity: 0;
        }

        .khung {
            background: url('imgs/img.png') no-repeat -1107px -828px;
            width: 179px;
            height: 45px;
            transform: scale(0.6);
            position: absolute;
            left: 120px;
            top: 135px;
        }

        .time {
            font-size: 100px;
            font-family: 'Intro', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            background: -webkit-linear-gradient(-86deg, #660610 5%, black 53%, #0A99B8 91%);
            -webkit-background-clip: text;
            -webkit-text-stroke: 8px transparent;
            color: white;
            position: absolute;
            left: 320px;
            top: 200px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes zoomout {
            0% { transform: scale(1.0); }
            100% { transform: scale(1.2); }
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        /* ========== MENU 3 GẠCH & CÁC TÍNH NĂNG MỚI ========== */
        .menu-icon {
            position: fixed;
            top: 20px;
            right: 25px;
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            z-index: 1000;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .menu-icon span {
            width: 28px;
            height: 3px;
            background: white;
            border-radius: 4px;
            transition: 0.3s;
        }

        .menu-icon:hover {
            background: #ffaa33;
            transform: scale(1.05);
        }

        /* Menu xổ xuống */
        .feature-panel {
            position: fixed;
            top: 80px;
            right: 25px;
            width: 290px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 18px 15px;
            color: white;
            z-index: 999;
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            font-size: 14px;
        }

        .feature-panel.open {
            transform: translateX(0);
        }

        .balance {
            font-size: 22px;
            font-weight: bold;
            color: #ffd966;
            margin-bottom: 12px;
            text-align: center;
            border-bottom: 1px dashed rgba(255,255,255,0.3);
            padding-bottom: 8px;
        }

        .quick-bet {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .quick-bet button {
            background: #ff9800;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .quick-bet button:hover {
            background: #ffc107;
            transform: scale(1.03);
        }

        .repeat-btn {
            background: #2c7da0;
            text-align: center;
            padding: 8px;
            border-radius: 40px;
            margin: 10px 0;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .repeat-btn:hover {
            background: #1f5e7a;
        }

        .sound-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 30px;
        }

        .rank {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 8px;
            margin: 10px 0;
            font-size: 12px;
            max-height: 130px;
            overflow-y: auto;
        }

        .rank h4 {
            margin: 0 0 6px 0;
            text-align: center;
            font-size: 14px;
        }

        .history {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 8px;
            font-size: 12px;
            margin-top: 6px;
        }

        .chat-box {
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 8px;
        }

        .chat-messages {
            height: 100px;
            overflow-y: auto;
            font-size: 11px;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 5px;
            margin-bottom: 6px;
        }

        .chat-input {
            width: 100%;
            padding: 6px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            text-align: center;
        }

        /* nút chuyển game nhỏ */
        .game-switch {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .game-switch button {
            background: #3a6ea5;
            border: none;
            padding: 5px 10px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body class="purple-theme">

    <!-- GAME CŨ KHÔNG THAY ĐỔI -->
    <div class="main">
        <div id="dragon" class="dragon"></div>
        <div class="khung"></div>
        <div id="time" class="time"></div>
        <p id="id" class="statustxt" style="position: absolute; opacity : 1; left: 180px;top: 130px; font-size: 17px"></p>
        <div id="taitxt" class="tai"></div>
        <div id="xiutxt" class="xiu"></div>
        <p id="sumxiu" class="usertxt" style="position: absolute; left: 115px;top: 242px;"></p>
        <p id="sumtai" class="usertxt" style="position: absolute; right: 130px;top: 242px;"></p>
        <div id="dice1" class="dice dice1"></div>
        <div id="dice2" class="dice dice2"></div>
        <div id="dice3" class="dice dice3"></div>
        <div class="user"></div>
        <div class="user" style="left: 80px;"></div>
        <input id="pullxiu" class="input" type="number" placeholder="Cược Xỉu">
        <input id="pulltai" class="input" type="number" style="left: 525px;" placeholder="Cược Tài">
        <img src="" id="roll" style="position: absolute; left:300px; top: 190px; transition: 0.5s;opacity: 0; width: 180px"/>
        <p id="userxiu" class="usertxt" style="position: absolute; left: 115px;top: 352px;"></p>
        <p id="usertai" class="usertxt" style="position: absolute; right: 180px;top: 352px;"></p>
        <div class="txt">
            <p id="statustxt" class="statustxt"></p>
        </div>
    </div>

    <!-- NÚT 3 GẠCH -->
    <div class="menu-icon" id="menuToggle">
        <span></span><span></span><span></span>
    </div>

    <!-- MENU CHỨA TẤT CẢ TÍNH NĂNG MỚI (ĐƯỢC GÓI GỌN) -->
    <div class="feature-panel" id="featurePanel">
        <div class="balance">💰 Số dư: <span id="playerBalance">100000</span> đ</div>
        <div class="quick-bet">
            <button onclick="quickBet('tai', 2)">x2</button>
            <button onclick="quickBet('tai', 5)">x5</button>
            <button onclick="quickBet('tai', 'all')">All-in</button>
        </div>
        <div class="repeat-btn" onclick="repeatBet()">🔄 Đặt lại cược cũ</div>
        <div class="sound-control">
            🔊 Âm thanh: <span id="soundStatus">Bật</span>
            <button onclick="toggleSound()" style="background:#555; border:none; border-radius:20px; padding:2px 12px;">Tắt/Mở</button>
        </div>
        <div class="rank">
            <h4>🏆 Bảng xếp hạng</h4>
            <div id="rankList">1. Đang cập nhật...</div>
        </div>
        <div class="history">
            <strong>📜 Lịch sử (10 ván)</strong><br>
            <div id="historyList">Chưa có</div>
        </div>
        <div class="game-switch">
            <button onclick="switchGame('taixiu')">🎲 Tài Xỉu</button>
            <button onclick="switchGame('baucua')">🦀 Bầu Cua</button>
            <button onclick="switchGame('pokermini')">♠️ Mini Poker</button>
        </div>
        <div class="chat-box">
            <div class="chat-messages" id="chatMessages">💬 Chào mừng bạn!</div>
            <input type="text" id="chatInput" class="chat-input" placeholder="Nhập chat...">
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ========== GIỮ NGUYÊN TOÀN BỘ LOGIC GAME CŨ ==========
        d1 = document.getElementById("dice1");
        d2 = document.getElementById("dice2");
        d3 = document.getElementById("dice3");
        idGame = document.getElementById("id");
        soNguoiChonTai = document.getElementById("usertai");
        soNguoiChonXiu = document.getElementById("userxiu");
        tongTienDatTai = document.getElementById("sumtai");
        tongTienDatXiu = document.getElementById("sumxiu");
        time = document.getElementById("time");

        gameStart = function(){
            time.style.opacity = 1;
            d1.style.opacity = 0;
            d2.style.opacity = 0;
            d3.style.opacity = 0;
            document.getElementById('dragon').style.webkitAnimationPlayState = 'running'; 
            document.getElementById("taitxt").style.webkitAnimationPlayState = 'paused';
            document.getElementById("xiutxt").style.webkitAnimationPlayState = 'paused'; 
        }
        gameOver = function(dice){
            time.style.opacity = 0;
            roll = document.getElementById("roll");
            document.getElementById('dragon').style.webkitAnimationPlayState = 'paused'; 
            roll.src = "";
            roll.src = 'imgs/roll1.gif';
            roll.style.opacity = 1;
            setTimeout(()=>{
                roll.style.opacity = 0;
                showDice(dice.dice1,dice.dice2,dice.dice3);
                document.getElementById(dice.result+"txt").style.webkitAnimationPlayState = 'running';
                addHistory(dice.result, dice.dice1+dice.dice2+dice.dice3);
                playSound('roll');
            },2000);
        }

        showDice = function(dice1,dice2,dice3){
            diceMap = {
                1: '0 -2px',
                2: '-103px -3px',
                3: '-204px -3px',
                4: '-305px -3px',
                5: '-404px -3px',
                6: '-507px -2px',
            };
            d1.style.background = "url('imgs/dice.png') no-repeat "+ diceMap[dice1];
            d2.style.background = "url('imgs/dice.png') no-repeat "+ diceMap[dice2];
            d3.style.background = "url('imgs/dice.png') no-repeat "+ diceMap[dice3];
            d1.style.opacity = 1;
            d2.style.opacity = 1;
            d3.style.opacity = 1;
        }

        showStt = function(msg,timeout = 3000){
            statustxt = document.getElementById('statustxt');
            statustxt.innerHTML = msg;
            statustxt.style.opacity = 1;
            setTimeout(()=>{
                statustxt.style.opacity = 0;
            },timeout);
        }

        gameStart();
        var socket = io();

        socket.on('gameData', function (data) {
            idGame.innerHTML         = '#' + data.idGame;
            soNguoiChonTai.innerHTML = data.soNguoiChonTai;
            soNguoiChonXiu.innerHTML = data.soNguoiChonXiu;
            tongTienDatTai.innerHTML = data.tongTienDatTai/1000 +'k';
            tongTienDatXiu.innerHTML = data.tongTienDatXiu/1000 +'k';
            if(data.time.toString().length == 1){
                time.innerHTML  = data.time == 0 ? '' : '0' + data.time;
            }else{
                time.innerHTML  = data.time;
            }
        });

        socket.on('gameOver', function (data) { gameOver(data); });
        socket.on('gameStart', function (data) { gameStart(); showStt('Game bắt đầu'); });
        socket.on('pull', function (data) {
            if(data.status == 'success'){
                showStt('Đặt cược thành công');
                if(data.newBalance) document.getElementById('playerBalance').innerText = data.newBalance;
                saveLastBet(data.dice, data.money);
            }else if(data.status == 'error') showStt(data.error);
        });
        socket.on('winGame', function (data) {
            showStt(data.msg,10000);
            playSound('win');
            if(data.newBalance) document.getElementById('playerBalance').innerText = data.newBalance;
        });
        socket.on('chatMessage', function (msg) {
            let chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML += `<div>💬 ${msg}</div>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });
        socket.on('updateRank', function (rankData) {
            let html = '';
            rankData.forEach((p, idx) => { html += `${idx+1}. ${p.name} - ${p.balance.toLocaleString()}đ<br>`; });
            document.getElementById('rankList').innerHTML = html || 'Chưa có dữ liệu';
        });

        document.getElementById('pulltai').addEventListener("keyup", function(event) {
            if (event.key === "Enter") { placeBet('tai', Number(this.value)); this.value = ''; }
        });
        document.getElementById('pullxiu').addEventListener("keyup", function(event) {
            if (event.key === "Enter") { placeBet('xiu', Number(this.value)); this.value = ''; }
        });

        function placeBet(dice, money){
            if(money > getCurrentBalance()) { showStt('Số dư không đủ!'); return; }
            socket.emit('pull',{ id : socket.id, dice: dice, money: money });
        }

        // ========== CÁC CHỨC NĂNG MỚI ==========
        let lastBet = { dice: null, money: 0 };
        let soundEnabled = true;
        let historyList = [];

        function getCurrentBalance() { return parseInt(document.getElementById('playerBalance').innerText.replace(/[^0-9]/g, '')) || 0; }
        function saveLastBet(dice, money) { lastBet = { dice, money }; }
        function repeatBet() {
            if(lastBet.dice && lastBet.money > 0) {
                if(lastBet.money > getCurrentBalance()) { showStt('Số dư không đủ để đặt lại!'); return; }
                socket.emit('pull', { id: socket.id, dice: lastBet.dice, money: lastBet.money });
                showStt(`Đặt lại ${lastBet.money} vào ${lastBet.dice.toUpperCase()}`);
            } else { showStt('Chưa có cược nào trước đó'); }
        }
        function quickBet(dice, multiplier) {
            let bal = getCurrentBalance();
            let bet = (multiplier === 'all') ? bal : Math.floor(bal / 10) * multiplier;
            if(bet < 1000) bet = 1000;
            if(bet > bal) bet = bal;
            if(bet <= 0) { showStt('Số dư không đủ'); return; }
            socket.emit('pull', { id: socket.id, dice: dice, money: bet });
            showStt(`Cược nhanh ${bet} vào ${dice.toUpperCase()}`);
        }
        function addHistory(result, total) {
            let resultText = (result === 'tai') ? 'Tài' : 'Xỉu';
            historyList.unshift(`${resultText} (${total})`);
            if(historyList.length > 10) historyList.pop();
            document.getElementById('historyList').innerHTML = historyList.join('<br>');
        }
        function playSound(type) {
            if(!soundEnabled) return;
            try {
                let audio = new Audio();
                if(type === 'roll') audio.src = 'https://www.soundjay.com/misc/sounds/dice-throw-01.mp3';
                else if(type === 'win') audio.src = 'https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3';
                audio.volume = 0.3;
                audio.play().catch(e=>console.log);
            } catch(e) {}
        }
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundStatus').innerText = soundEnabled ? 'Bật' : 'Tắt';
        }
        document.getElementById('chatInput').addEventListener('keyup', function(e) {
            if(e.key === 'Enter' && this.value.trim()) {
                socket.emit('sendChat', this.value);
                this.value = '';
            }
        });
        function switchGame(game) {
            if(game === 'taixiu') showStt('Đã chuyển sang Tài Xỉu');
            else if(game === 'baucua') showStt('Tính năng Bầu Cua sắp ra mắt!');
            else if(game === 'pokermini') showStt('Mini Poker đang phát triển');
        }

        // ==== XỬ LÝ MENU 3 GẠCH + ĐỔI THEME (TÍM ↔ XANH TRẮNG ĐẬM MỜ ẢO) ====
        const menuBtn = document.getElementById('menuToggle');
        const panel = document.getElementById('featurePanel');
        let isMenuOpen = false;

        menuBtn.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            if(isMenuOpen) {
                panel.classList.add('open');
                // Đổi theme từ tím sang xanh trắng mờ ảo
                document.body.classList.remove('purple-theme');
                document.body.classList.add('cyan-theme');
            } else {
                panel.classList.remove('open');
                // Quay về theme tím
                document.body.classList.remove('cyan-theme');
                document.body.classList.add('purple-theme');
            }
        });

        // Tự động tăng dư nếu server chưa hỗ trợ (demo)
        setInterval(() => {
            let cur = getCurrentBalance();
            if(cur < 100000) document.getElementById('playerBalance').innerText = cur + 500;
        }, 40000);
    </script>
</body>
    </html>
